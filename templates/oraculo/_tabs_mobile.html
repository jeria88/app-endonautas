{% comment %}Segmentado móvil de Oráculo — solo <768px (clase m-only). Estado activo server-rendered por página; la SPA lo refresca al swapear #page-content.{% endcomment %}

  <a href="/oraculo/iching/" data-preset="oraculo" onclick="spaGo(event,this)" class="orac-tab{% if request.path == '/oraculo/iching/' %} active{% endif %}">I Ching</a>
  <a href="/oraculo/fractal/" data-preset="oraculo" onclick="spaGo(event,this)" class="orac-tab{% if request.path == '/oraculo/fractal/' %} active{% endif %}">Fractal</a>
</div>

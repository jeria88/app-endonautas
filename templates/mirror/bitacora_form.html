{% extends "base.html" %}
{% block title %}Nueva entrada — Bitácora{% endblock %}
{% block content %}

<a href="/bitacora/" onclick="spaGo(event,this)" style="color:var(--calipso);text-decoration:none;font-size:0.82rem;display:inline-block;margin-bottom:1.25rem">← Bitácora</a>

<h1 style="font-size:1.2rem;font-weight:700;margin-bottom:1.25rem">Nueva entrada</h1>

<form method="post" class="panel" style="padding:1.25rem;max-width:560px">
  {% csrf_token %}
  <div class="form-group">
    <label class="form-label">¿Cómo fue? ¿Qué notaste?</label>
    <textarea name="content" class="form-input" rows="5" required placeholder="Escribe libremente. Este espacio es solo tuyo..." autofocus></textarea>
  </div>
  <div style="display:grid;grid-template-columns:1fr 80px;gap:0.75rem">
    <div class="form-group">
      <label class="form-label">Etiquetas (separadas por espacio)</label>
      <input type="text" name="tags" class="form-input" placeholder="reflejo miedo cuerpo...">
    </div>
    <div class="form-group">
      <label class="form-label">Emoji</label>
      <input type="text" name="emoji" class="form-input" placeholder="◈" maxlength="2" style="text-align:center;font-size:1.2rem">
    </div>
  </div>
  <div style="display:flex;gap:0.75rem;margin-top:0.75rem">
    <a href="/bitacora/" onclick="spaGo(event,this)" class="btn btn-secondary">Cancelar</a>
    <button type="submit" class="btn btn-primary" style="flex:1">Guardar entrada →</button>
  </div>
</form>

{% endblock %}

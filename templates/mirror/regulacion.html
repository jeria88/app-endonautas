{% extends "base.html" %}
{% block title %}Regulación — Endonautas{% endblock %}
{% block content %}
<style data-page-style>
/* ── Layout ── */
.reg-wrap { display:grid; grid-template-columns:220px 1fr; gap:1.5rem; align-items:start; }
@media(max-width:780px){ .reg-wrap { grid-template-columns:1fr; } }

/* ── Sidebar categorías ── */
.cat-nav { display:flex; flex-direction:column; gap:0.4rem; }
.cat-btn {
  display:flex; align-items:center; gap:0.75rem;
  padding:0.65rem 0.9rem; border-radius:12px;
  background:transparent; border:1px solid transparent;
  color:var(--muted); font-size:0.8rem; font-family:var(--font-display);
  cursor:pointer; transition:all 0.2s; text-align:left; width:100%;
}
.cat-btn:hover { background:var(--surface); color:#fff; }
.cat-btn.active { background:var(--surface2); border-color:var(--border-active); color:var(--calipso); }
.cat-icon { font-size:1.1rem; width:22px; text-align:center; flex-shrink:0; }
.cat-count { margin-left:auto; font-size:0.65rem; color:var(--dim);
  background:rgba(255,255,255,0.06); border-radius:100px; padding:1px 7px; }

/* ── Grid de ejercicios ── */
.ejerc-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:1rem; }
.ejerc-card {
  background:var(--surface); border:1px solid var(--border); border-radius:14px;
  padding:1.1rem 1.1rem 1rem; cursor:pointer; transition:all 0.2s;
  display:flex; flex-direction:column; gap:0.4rem;
}
.ejerc-card:hover { border-color:var(--border-active); background:var(--surface2); transform:translateY(-2px); }
.ejerc-cat-tag { font-size:0.58rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; }
.ejerc-title { font-family:var(--font-display); font-size:0.88rem; font-weight:600; color:#fff; line-height:1.3; }
.ejerc-sub { font-size:0.72rem; color:var(--muted); line-height:1.3; }
.ejerc-footer { display:flex; align-items:center; gap:0.5rem; margin-top:0.5rem; }
.ejerc-dur { font-size:0.65rem; color:var(--dim); }
.ejerc-mode-badge { font-size:0.6rem; background:rgba(255,255,255,0.06); color:var(--dim);
  border-radius:100px; padding:2px 8px; }

/* ── Player ── */
.player-wrap { display:none; }
.player-wrap.active { display:block; }
.player-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:1.5rem; }
.back-btn {
  display:flex; align-items:center; gap:0.4rem; background:var(--surface);
  border:1px solid var(--border); border-radius:10px; padding:0.4rem 0.75rem;
  color:var(--muted); font-size:0.75rem; cursor:pointer; transition:all 0.15s;
  font-family:var(--font-display);
}
.back-btn:hover { color:#fff; border-color:var(--border-active); }
.player-cat-tag { font-size:0.6rem; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; }

.player-panel { background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden; }
.anim-zone { position:relative; height:260px; overflow:hidden; background:rgba(2,4,16,0.55); }
#animCanvas { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:0; display:block; }
.anim-overlay { position:absolute; inset:0; z-index:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1rem; pointer-events:none; }
.anim-overlay .sq-controls { pointer-events:auto; }
.content-zone { padding:1.5rem 1.75rem; }
.player-title { font-family:var(--font-display); font-size:1.3rem; font-weight:700; color:#fff; margin-bottom:0.2rem; }
.player-sub { font-size:0.82rem; color:var(--muted); margin-bottom:1rem; }
.player-desc { font-size:0.82rem; color:var(--dim); line-height:1.6; margin-bottom:1.5rem;
  padding-bottom:1.25rem; border-bottom:1px solid var(--border); }
.precaution { background:rgba(217,119,6,0.1); border:1px solid rgba(217,119,6,0.3);
  border-radius:10px; padding:0.65rem 0.9rem; font-size:0.75rem; color:#d4a056;
  margin-bottom:1.25rem; display:flex; gap:0.5rem; align-items:flex-start; }

/* ── Player: Respiración ── */
.breath-player { display:flex; flex-direction:column; align-items:center; gap:1.5rem; padding:1rem 0; }
.breath-ring-outer { position:relative; width:160px; height:160px; }
.breath-svg { width:100%; height:100%; transform:rotate(-90deg); }
.breath-track { fill:none; stroke:rgba(255,255,255,0.06); stroke-width:6; }
.breath-prog { fill:none; stroke:var(--calipso); stroke-width:6; stroke-linecap:round;
  transition:stroke-dashoffset 0.5s linear; }
.breath-inner-circle { position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:2px; }
.breath-phase-name { font-family:var(--font-display); font-size:0.8rem; color:var(--calipso);
  font-weight:700; letter-spacing:0.08em; }
.breath-countdown { font-family:var(--font-display); font-size:2rem; font-weight:700; color:#fff; }
.breath-cue { font-size:0.75rem; color:var(--dim); text-align:center; max-width:260px; min-height:2.4em; }
.breath-phases-dots { display:flex; gap:6px; }
.breath-dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.1); transition:all 0.3s; }
.breath-dot.active { background:var(--calipso); }
.breath-cycle-info { font-size:0.72rem; color:var(--dim); }
.breath-controls { display:flex; gap:0.75rem; }

/* ── Square breathing overlay ── */
.breath-sq { display:flex; flex-direction:column; align-items:center; gap:1rem; padding:1.2rem 0 0.5rem; }
.sq-phase-name { font-family:var(--font-display); font-size:0.65rem; font-weight:700; letter-spacing:0.32em; text-transform:uppercase; transition:color 1.2s ease; color:var(--calipso); }
.sq-countdown { font-family:var(--font-display); font-size:4rem; font-weight:200; color:rgba(255,255,255,0.85); letter-spacing:-0.04em; line-height:1; min-width:3rem; text-align:center; text-shadow:0 0 60px rgba(126,204,205,0.15); }
.sq-cue { font-size:0.73rem; color:var(--dim); text-align:center; max-width:260px; min-height:2.2em; line-height:1.55; }
.sq-dots { display:flex; gap:10px; }
.sq-dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.06); transition:all 0.5s; }
.sq-dot.active { background:currentColor; box-shadow:0 0 10px currentColor; }
.sq-cycle { font-size:0.58rem; color:var(--dim); letter-spacing:0.22em; text-transform:uppercase; }
.sq-btn { padding:0.45rem 1.6rem; border-radius:8px; font-size:0.7rem; font-family:var(--font-display); font-weight:700; letter-spacing:0.12em; text-transform:uppercase; cursor:pointer; background:transparent; border:1px solid rgba(126,204,205,0.25); color:rgba(126,204,205,0.65); transition:all 0.25s; }
.sq-btn:hover { border-color:rgba(126,204,205,0.65); color:#7ECCCD; box-shadow:0 0 20px rgba(126,204,205,0.12); }
.sq-controls { display:flex; justify-content:center; padding:0.5rem 0 0; }

/* ── Exercise diagram ── */
.exercise-diagram { margin-bottom:1.25rem; padding:1rem 0.75rem 0.75rem; background:rgba(2,4,16,0.35); border:1px solid var(--border); border-radius:12px; display:flex; flex-direction:column; align-items:center; gap:0.6rem; }
.exercise-diagram svg { max-width:200px; width:100%; }
.diagram-label { font-size:0.62rem; color:var(--dim); text-align:center; letter-spacing:0.08em; text-transform:uppercase; }

/* ── Player: Pasos ── */
.steps-player { display:flex; flex-direction:column; gap:1.25rem; }
.step-progress { display:flex; gap:4px; margin-bottom:0.25rem; }
.step-pip { height:3px; border-radius:100px; flex:1; background:rgba(255,255,255,0.08); transition:all 0.3s; }
.step-pip.done { background:var(--calipso); }
.step-pip.current { background:rgba(126,204,205,0.5); }
.step-body { background:var(--surface2); border-radius:12px; padding:1.25rem; min-height:100px; }
.step-num { font-size:0.6rem; color:var(--dim); font-weight:700; letter-spacing:0.1em; margin-bottom:0.5rem; }
.step-title-main { font-family:var(--font-display); font-size:1rem; font-weight:600; color:#fff; margin-bottom:0.65rem; }
.step-instructions { font-size:0.82rem; color:var(--muted); line-height:1.65; white-space:pre-line; }
.steps-nav { display:flex; gap:0.75rem; justify-content:space-between; align-items:center; }
.step-counter { font-size:0.72rem; color:var(--dim); }

/* ── Player: Vocal ── */
.vocal-player { display:flex; flex-direction:column; align-items:center; gap:1.5rem; padding:1rem 0; }
.vocal-sound { font-size:3.5rem; font-family:var(--font-display); font-weight:700; color:var(--calipso);
  text-shadow:0 0 40px rgba(126,204,205,0.4); animation:vocalPulse 2s ease-in-out infinite; }
@keyframes vocalPulse { 0%,100%{opacity:0.8;transform:scale(1)} 50%{opacity:1;transform:scale(1.06)} }
.vocal-zone { font-size:0.65rem; color:var(--dim); letter-spacing:0.1em; text-transform:uppercase; }
.vocal-body { font-size:0.82rem; color:var(--muted); text-align:center; max-width:320px; line-height:1.6; }
.vocal-wave { display:flex; align-items:flex-end; gap:3px; height:32px; }
.vocal-bar { width:4px; border-radius:2px; background:var(--calipso); opacity:0.3; }
.vocal-bar.a { animation:waveBar 0.8s ease-in-out infinite; }
.vocal-bar.b { animation:waveBar 0.8s ease-in-out 0.15s infinite; }
.vocal-bar.c { animation:waveBar 0.8s ease-in-out 0.30s infinite; }
.vocal-bar.d { animation:waveBar 0.8s ease-in-out 0.45s infinite; }
.vocal-bar.e { animation:waveBar 0.8s ease-in-out 0.60s infinite; }
@keyframes waveBar {
  0%,100% { height:6px; opacity:0.3; }
  50% { height:28px; opacity:0.9; }
}

/* ── Player: Visualización / Reflexión ── */
.visual-player, .reflex-player { display:flex; flex-direction:column; gap:1.25rem; }
.step-body.visual { background:rgba(126,204,205,0.04); border:1px solid rgba(126,204,205,0.15); }

/* ── Botones ── */
.btn-reg { padding:0.55rem 1.2rem; border-radius:10px; font-size:0.8rem; font-family:var(--font-display);
  font-weight:600; cursor:pointer; transition:all 0.2s; border:1px solid transparent; }
.btn-primary { background:var(--calipso); color:#0a0a14; }
.btn-primary:hover { filter:brightness(1.1); }
.btn-outline { background:transparent; border-color:var(--border); color:var(--muted); }
.btn-outline:hover { border-color:var(--border-active); color:#fff; }
.btn-sm { padding:0.4rem 0.9rem; font-size:0.73rem; }
.btn-done { background:rgba(126,204,205,0.12); border:1px solid rgba(126,204,205,0.3); color:var(--calipso); }
.btn-done:hover { background:rgba(126,204,205,0.2); }

/* ── Vacío ── */
.empty-cat { text-align:center; padding:3rem 1rem; color:var(--dim); font-size:0.82rem; }

/* ── Audio toggle ── */
.audio-btn {
  margin-left:auto; display:flex; align-items:center; gap:0.3rem;
  background:rgba(255,255,255,0.04); border:1px solid var(--border);
  border-radius:8px; padding:0.28rem 0.65rem; color:var(--dim);
  font-size:0.68rem; cursor:pointer; transition:all 0.2s; font-family:var(--font-display);
}
.audio-btn.on { border-color:rgba(126,204,205,0.45); color:var(--calipso); background:rgba(126,204,205,0.08); }
</style>

<div style="margin-bottom:1.75rem; display:flex; align-items:flex-end; gap:1rem; flex-wrap:wrap;">
  <div>
    <h1 style="font-family:var(--font-display);font-size:1.6rem;font-weight:700;color:#fff;letter-spacing:-0.02em;margin:0">Regulación</h1>
    <p style="font-size:0.8rem;color:var(--dim);margin:4px 0 0">{{ total }} ejercicio{{ total|pluralize }} · Elige una categoría o un ejercicio directo</p>
  </div>
</div>

<div class="reg-wrap" id="regWrap">

  <!-- Sidebar navegación de categorías -->
  <nav class="cat-nav" id="catNav">
    <button class="cat-btn active" data-cat="" onclick="setCat(this,'')">
      <span class="cat-icon">◎</span> Todos
      <span class="cat-count" id="count-all">{{ total }}</span>
    </button>
    <button class="cat-btn" data-cat="aliento" onclick="setCat(this,'aliento')">
      <span class="cat-icon">◌</span> Aliento
      <span class="cat-count" id="count-aliento">–</span>
    </button>
    <button class="cat-btn" data-cat="integracion" onclick="setCat(this,'integracion')">
      <span class="cat-icon">⊕</span> Integración
      <span class="cat-count" id="count-integracion">–</span>
    </button>
    <button class="cat-btn" data-cat="resonancia" onclick="setCat(this,'resonancia')">
      <span class="cat-icon">∿</span> Resonancia
      <span class="cat-count" id="count-resonancia">–</span>
    </button>
    <button class="cat-btn" data-cat="espectro" onclick="setCat(this,'espectro')">
      <span class="cat-icon">◈</span> Espectro
      <span class="cat-count" id="count-espectro">–</span>
    </button>
    <button class="cat-btn" data-cat="campo" onclick="setCat(this,'campo')">
      <span class="cat-icon">⬡</span> Campo
      <span class="cat-count" id="count-campo">–</span>
    </button>
    <button class="cat-btn" data-cat="presencia" onclick="setCat(this,'presencia')">
      <span class="cat-icon">◉</span> Presencia
      <span class="cat-count" id="count-presencia">–</span>
    </button>
  </nav>

  <!-- Área principal -->
  <div id="mainArea">

    <!-- Biblioteca -->
    <div id="biblioteca">
      <div class="ejerc-grid" id="ejercGrid"></div>
      <div class="empty-cat" id="emptyMsg" style="display:none">Sin ejercicios en esta categoría.</div>
    </div>

    <!-- Player -->
    <div class="player-wrap" id="playerWrap">
      <div class="player-header">
        <button class="back-btn" onclick="cerrarPlayer()">← Volver</button>
        <span class="player-cat-tag" id="playerCatTag" style="color:var(--calipso)"></span>
        <button class="audio-btn" id="audioToggle" onclick="audioEngine.toggle()">♪ Sonido</button>
      </div>
      <div class="player-panel">
        <!-- Zona animación: canvas + overlay de controles de respiración -->
        <div class="anim-zone">
          <canvas id="animCanvas"></canvas>
          <div class="anim-overlay" id="animOverlay"></div>
        </div>
        <!-- Zona contenido: título, descripción, pasos, botones -->
        <div class="content-zone">
          <div class="player-title" id="playerTitle"></div>
          <div class="player-sub" id="playerSub"></div>
          <div class="player-desc" id="playerDesc"></div>
          <div class="precaution" id="playerPrecaution" style="display:none">
            <span>⚠</span><span id="playerPrecautionText"></span>
          </div>
          <div id="playerBody"></div>
          <div style="margin-top:1.5rem; padding-top:1.25rem; border-top:1px solid var(--border); display:flex; gap:0.75rem; flex-wrap:wrap;">
            <button class="btn-reg btn-done" onclick="marcarCompletado()">Ejercicio completado</button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const EJERCICIOS = {{ ejercicios_json|safe }};
const EJERCICIO_INICIAL = {{ ejercicio_inicial|default:"null" }};
const CATEGORIA_INICIAL = "{{ categoria_inicial }}";

const CAT_COLORS = {
  aliento:'#7ECCCD', integracion:'#9b8ec4', resonancia:'#c97b84',
  espectro:'#d4a056', campo:'#7ECCCD', presencia:'#9b8ec4',
};
const CAT_LABELS = {
  aliento:'Aliento', integracion:'Integración', resonancia:'Resonancia',
  espectro:'Espectro', campo:'Campo', presencia:'Presencia',
};
const MODE_LABELS = {
  respiracion:'Timer', pasos:'Guiado', vocal:'Vocal',
  visualizacion:'Visualización', reflexion:'Reflexión',
};

let catActual = CATEGORIA_INICIAL || '';
let ejercActual = null;

// ── Conteos ──────────────────────────────────────────────────────────────────
function initCounts() {
  const counts = {};
  Object.values(EJERCICIOS).forEach(e => { counts[e.category] = (counts[e.category]||0)+1; });
  Object.keys(counts).forEach(c => {
    const el = document.getElementById('count-' + c);
    if (el) el.textContent = counts[c];
  });
}

// ── Biblioteca ────────────────────────────────────────────────────────────────
function setCat(btn, cat) {
  catActual = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function renderGrid() {
  cerrarPlayer(true);
  const grid = document.getElementById('ejercGrid');
  const empty = document.getElementById('emptyMsg');
  const lista = Object.values(EJERCICIOS).filter(e => !catActual || e.category === catActual);
  if (!lista.length) { grid.innerHTML=''; empty.style.display=''; return; }
  empty.style.display = 'none';
  grid.innerHTML = lista.map(e => `
    <div class="ejerc-card" onclick="abrirEjercicio('${e.id}')">
      <div class="ejerc-cat-tag" style="color:${CAT_COLORS[e.category]||'var(--calipso)'}">${CAT_LABELS[e.category]||e.category}</div>
      <div class="ejerc-title">${e.title}</div>
      <div class="ejerc-sub">${e.subtitle||''}</div>
      <div class="ejerc-footer">
        <span class="ejerc-dur">⏱ ${e.duration_minutes} min</span>
        <span class="ejerc-mode-badge">${MODE_LABELS[e.ui_mode]||e.ui_mode}</span>
      </div>
    </div>
  `).join('');
}

// ── Player ────────────────────────────────────────────────────────────────────
function abrirEjercicio(id) {
  const e = EJERCICIOS[String(id)];
  if (!e) return;
  ejercActual = e;

  document.getElementById('playerTitle').textContent = e.title;
  document.getElementById('playerSub').textContent = e.subtitle || '';
  document.getElementById('playerDesc').textContent = e.description || '';
  document.getElementById('playerCatTag').textContent = CAT_LABELS[e.category] || e.category;
  document.getElementById('playerCatTag').style.color = CAT_COLORS[e.category] || 'var(--calipso)';

  const prec = document.getElementById('playerPrecaution');
  if (e.precaution) {
    document.getElementById('playerPrecautionText').textContent = e.precaution;
    prec.style.display = 'flex';
  } else {
    prec.style.display = 'none';
  }

  // Respiración con animación custom → overlay dentro de la zona de animación
  // Todo lo demás → playerBody debajo de la animación
  document.getElementById('animOverlay').innerHTML = '';
  document.getElementById('playerBody').innerHTML = '';
  if (e.ui_mode === 'respiracion' && ANIM_TYPE_MAP[e.title]) {
    document.getElementById('animOverlay').innerHTML = renderBreath(e);
  } else {
    document.getElementById('playerBody').innerHTML = renderPlayer(e);
  }
  initPlayer(e);

  document.getElementById('biblioteca').style.display = 'none';
  document.getElementById('playerWrap').classList.add('active');
  document.getElementById('regWrap').scrollIntoView({behavior:'smooth', block:'start'});
  setTimeout(() => animEngine.start(e.ui_mode, e.category, CAT_COLORS[e.category], getAnimType(e)), 60);
}

function cerrarPlayer(silent) {
  stopBreath();
  animEngine.stop();
  audioEngine.stop();
  document.getElementById('animOverlay').innerHTML = '';
  document.getElementById('playerBody').innerHTML = '';
  document.getElementById('playerWrap').classList.remove('active');
  document.getElementById('biblioteca').style.display = '';
  ejercActual = null;
  if (!silent) document.getElementById('regWrap').scrollIntoView({behavior:'smooth', block:'start'});
}

function renderPlayer(e) {
  const d = getDiagram(e);
  if (e.ui_mode === 'respiracion') return d + renderBreath(e);
  if (e.ui_mode === 'vocal') return d + renderVocal(e);
  if (e.ui_mode === 'visualizacion') return d + renderVisual(e);
  if (e.ui_mode === 'reflexion') return d + renderReflex(e);
  return d + renderPasos(e);
}

// ── Respiración ──────────────────────────────────────────────────────────────
let breathTimer = null, breathPhaseIdx = 0, breathCountdown = 0, breathCycles = 0, breathRunning = false;

// Phase colors matching the canvas animation
const SQ_PHASE_COLORS = ['hsl(186,90%,72%)','hsl(215,75%,82%)','hsl(265,72%,72%)','hsl(195,55%,62%)'];

function renderBreath(e) {
  // Todos los ejercicios con animación canvas custom: overlay neon (sin SVG ring)
  if (ANIM_TYPE_MAP[e.title]) {
    const first = e.phases&&e.phases[0];
    const dots = (e.phases||[]).map((_,i) =>
      `<div class="sq-dot" id="bdot-${i}" style="color:${SQ_PHASE_COLORS[i%4]||'var(--calipso)'}"></div>`
    ).join('');
    return `<div class="breath-sq">
      <div class="sq-phase-name" id="bPhaseName">${first?first.name:'—'}</div>
      <div class="sq-countdown" id="bCountdown">—</div>
      <div class="sq-cue" id="bCue">${first?first.cue||'':''}</div>
      <div class="sq-dots">${dots}</div>
      <div class="sq-cycle" id="bCycleInfo">Ciclo 0</div>
    </div>
    <div class="sq-controls">
      <button class="sq-btn" id="breathStartBtn" onclick="toggleBreath()">Iniciar</button>
    </div>`;
  }
  // Generic breathing (sin animación custom): SVG ring timer
  const r = 68, circ = 2*Math.PI*r;
  const dots = (e.phases||[]).map((_,i)=>`<div class="breath-dot" id="bdot-${i}"></div>`).join('');
  return `<div class="breath-player">
    <div class="breath-ring-outer">
      <svg class="breath-svg" viewBox="0 0 160 160">
        <circle class="breath-track" cx="80" cy="80" r="${r}"/>
        <circle class="breath-prog" id="breathProg" cx="80" cy="80" r="${r}"
          stroke-dasharray="${circ}" stroke-dashoffset="${circ}"/>
      </svg>
      <div class="breath-inner-circle">
        <div class="breath-phase-name" id="bPhaseName">${(e.phases&&e.phases[0])?e.phases[0].name:'—'}</div>
        <div class="breath-countdown" id="bCountdown">—</div>
      </div>
    </div>
    <div class="breath-phases-dots">${dots}</div>
    <div class="breath-cue" id="bCue">${(e.phases&&e.phases[0])?e.phases[0].cue||'':''}</div>
    <div class="breath-cycle-info" id="bCycleInfo">Ciclo 0</div>
    <div class="breath-controls">
      <button class="btn-reg btn-primary" id="breathStartBtn" onclick="toggleBreath()">Iniciar</button>
    </div>
  </div>`;
}

function initPlayer(e) {
  if (e.ui_mode === 'respiracion') {
    breathPhaseIdx = 0; breathCycles = 0; breathRunning = false;
  }
  if (e.ui_mode === 'pasos') {
    currentStep = 0;
    renderStep(e, 0);
  }
  if (e.ui_mode === 'vocal') {
    currentVocalStep = 0;
    renderVocalStep(e, 0);
  }
  if (e.ui_mode === 'visualizacion' || e.ui_mode === 'reflexion') {
    currentStep = 0;
    renderStep(e, 0);
  }
}

function toggleBreath() {
  if (!ejercActual) return;
  breathRunning = !breathRunning;
  const btn = document.getElementById('breathStartBtn');
  if (btn) btn.textContent = breathRunning ? 'Pausar' : 'Continuar';
  if (breathRunning) tickBreath();
  else stopBreath(false);
}

function stopBreath(reset) {
  if (breathTimer) { clearTimeout(breathTimer); breathTimer = null; }
  breathRunning = false;
  const btn = document.getElementById('breathStartBtn');
  if (btn) btn.textContent = reset===false ? 'Continuar' : 'Iniciar';
}

function tickBreath() {
  if (!breathRunning || !ejercActual) return;
  const phases = ejercActual.phases || [];
  if (!phases.length) return;
  const phase = phases[breathPhaseIdx % phases.length];
  const r = 68, circ = 2*Math.PI*r;
  const dur = phase.duration;

  const phaseName = document.getElementById('bPhaseName');
  const cueEl = document.getElementById('bCue');
  const cdEl = document.getElementById('bCountdown');
  const prog = document.getElementById('breathProg');
  const cycleEl = document.getElementById('bCycleInfo');

  if (phaseName) phaseName.textContent = phase.name;
  if (cueEl) cueEl.textContent = phase.cue || '';
  animEngine.setPhase(phase.name, phase.duration);
  // Todas las animaciones custom: colorear el phase name
  if (ejercActual && ANIM_TYPE_MAP[ejercActual.title] && phaseName) {
    phaseName.style.color = SQ_PHASE_COLORS[breathPhaseIdx % phases.length] || SQ_PHASE_COLORS[0];
  }

  // Update dots
  phases.forEach((_,i) => {
    const dot = document.getElementById('bdot-'+i);
    if (dot) dot.classList.toggle('active', i === breathPhaseIdx % phases.length);
  });

  let remaining = dur;
  function tick() {
    if (!breathRunning) return;
    const fraction = remaining / dur;
    if (prog) prog.style.strokeDashoffset = circ * fraction;
    if (cdEl) cdEl.textContent = remaining;
    if (remaining <= 0) {
      breathPhaseIdx++;
      if (breathPhaseIdx % phases.length === 0) {
        breathCycles++;
        if (cycleEl) cycleEl.textContent = `Ciclo ${breathCycles}`;
      }
      tickBreath();
      return;
    }
    remaining--;
    breathTimer = setTimeout(tick, 1000);
  }
  tick();
}

// ── Pasos ────────────────────────────────────────────────────────────────────
let currentStep = 0;

function renderPasos(e) {
  const n = (e.steps||[]).length;
  const pips = Array.from({length:n},(_,i)=>`<div class="step-pip" id="pip-${i}"></div>`).join('');
  return `<div class="steps-player">
    <div class="step-progress">${pips}</div>
    <div class="step-body" id="stepBody"></div>
    <div class="steps-nav">
      <button class="btn-reg btn-outline btn-sm" id="prevBtn" onclick="moveStep(-1)">← Anterior</button>
      <span class="step-counter" id="stepCounter"></span>
      <button class="btn-reg btn-primary btn-sm" id="nextBtn" onclick="moveStep(1)">Siguiente →</button>
    </div>
  </div>`;
}

function renderStep(e, idx) {
  const steps = e.steps || [];
  const n = steps.length;
  if (!n) return;
  currentStep = Math.max(0, Math.min(idx, n-1));
  const step = steps[currentStep];
  const body = document.getElementById('stepBody');
  if (body) {
    body.innerHTML = `
      <div class="step-num">PASO ${currentStep+1} DE ${n}</div>
      <div class="step-title-main">${step.title}</div>
      <div class="step-instructions">${step.body}</div>
    `;
  }
  const counter = document.getElementById('stepCounter');
  if (counter) counter.textContent = `${currentStep+1} / ${n}`;
  const prev = document.getElementById('prevBtn');
  const next = document.getElementById('nextBtn');
  if (prev) prev.disabled = currentStep === 0;
  if (next) {
    next.textContent = currentStep === n-1 ? 'Finalizar ✓' : 'Siguiente →';
    next.onclick = currentStep === n-1 ? marcarCompletado : () => moveStep(1);
  }
  // Update pips
  for (let i=0;i<n;i++) {
    const pip = document.getElementById('pip-'+i);
    if (pip) {
      pip.classList.remove('done','current');
      if (i < currentStep) pip.classList.add('done');
      else if (i === currentStep) pip.classList.add('current');
    }
  }
}

function moveStep(dir) {
  if (!ejercActual) return;
  renderStep(ejercActual, currentStep + dir);
}

// ── Vocal ────────────────────────────────────────────────────────────────────
let currentVocalStep = 0;

function renderVocal(e) {
  const n = (e.steps||[]).length;
  const pips = Array.from({length:n},(_,i)=>`<div class="step-pip" id="vpip-${i}"></div>`).join('');
  return `<div class="vocal-player">
    <div class="vocal-wave">
      <div class="vocal-bar a" style="height:8px"></div>
      <div class="vocal-bar b" style="height:14px"></div>
      <div class="vocal-bar c" style="height:20px"></div>
      <div class="vocal-bar d" style="height:14px"></div>
      <div class="vocal-bar e" style="height:8px"></div>
    </div>
    <div class="vocal-sound" id="vocalSound">—</div>
    <div class="vocal-zone" id="vocalZone"></div>
    <div class="vocal-body" id="vocalBody"></div>
    <div class="step-progress" style="width:100%;max-width:260px">${pips}</div>
    <div class="breath-controls">
      <button class="btn-reg btn-outline btn-sm" id="vPrevBtn" onclick="moveVocal(-1)">← Anterior</button>
      <button class="btn-reg btn-primary btn-sm" id="vNextBtn" onclick="moveVocal(1)">Siguiente →</button>
    </div>
  </div>`;
}

function renderVocalStep(e, idx) {
  const steps = e.steps || [];
  const n = steps.length;
  currentVocalStep = Math.max(0, Math.min(idx, n-1));
  const step = steps[currentVocalStep];
  const sound = document.getElementById('vocalSound');
  const zone = document.getElementById('vocalZone');
  const body = document.getElementById('vocalBody');
  if (sound) sound.textContent = step.title.split('—')[0].trim();
  if (zone) zone.textContent = (step.zona||'').toUpperCase();
  if (body) body.textContent = step.body;
  for (let i=0;i<n;i++) {
    const pip = document.getElementById('vpip-'+i);
    if (pip) {
      pip.classList.remove('done','current');
      if (i < currentVocalStep) pip.classList.add('done');
      else if (i === currentVocalStep) pip.classList.add('current');
    }
  }
  const next = document.getElementById('vNextBtn');
  if (next) {
    next.textContent = currentVocalStep===n-1 ? 'Finalizar ✓' : 'Siguiente →';
    next.onclick = currentVocalStep===n-1 ? marcarCompletado : ()=>moveVocal(1);
  }
}

function moveVocal(dir) {
  if (!ejercActual) return;
  renderVocalStep(ejercActual, currentVocalStep + dir);
}

// ── Visualización ─────────────────────────────────────────────────────────────
function renderVisual(e) {
  const n = (e.steps||[]).length;
  const pips = Array.from({length:n},(_,i)=>`<div class="step-pip" id="pip-${i}"></div>`).join('');
  return `<div class="visual-player">
    <div class="step-progress">${pips}</div>
    <div class="step-body visual" id="stepBody"></div>
    <div class="steps-nav">
      <button class="btn-reg btn-outline btn-sm" id="prevBtn" onclick="moveStep(-1)">← Anterior</button>
      <span class="step-counter" id="stepCounter"></span>
      <button class="btn-reg btn-primary btn-sm" id="nextBtn" onclick="moveStep(1)">Siguiente →</button>
    </div>
  </div>`;
}

function renderReflex(e) {
  return renderVisual(e);
}

// ── Completado ────────────────────────────────────────────────────────────────
function marcarCompletado() {
  if (!ejercActual) return;
  fetch('/regulacion/completado/', {
    method:'POST',
    headers:{'Content-Type':'application/json','X-CSRFToken':document.querySelector('[name=csrfmiddlewaretoken]')?.value||''},
    body: JSON.stringify({ejercicio_id: ejercActual.id}),
  }).catch(()=>{});
  const btn = document.querySelector('.btn-done');
  if (btn) { btn.textContent = '✓ Registrado en bitácora'; btn.disabled = true; }
}

// ── Animation type map ────────────────────────────────────────────────────────
const ANIM_TYPE_MAP = {
  'Respiración Cuadrada':      'square',
  'Nadi Shodhana':             'bilateral',
  'Respiración de Fuego':      'pulse_radial',
  'Parasimpático 4 · 8':      'wave_asymmetric',

  'Respiración Conectada':     'torus',

  'Marcha Cruzada':            'crossing',
  '8 Perezoso':                'infinity',
  'Ganchos de Cook':           'circuit',
  'Botones del Cerebro':       'flow_up',
  'Tensión y Liberación':      'compress_release',
  'Rotación de Ojos':          'orbit',
  'Entonación de Vocales':     'body_column',
  'Seis Sonidos Curativos':    'organ_exhale',
  'Respiración de Color':      'color_wash',
  'Los 5 Elementos':           'elemental',
  'Armonización por Dedos':    'pulse_sync',
  'Puntos Neurovasculares':    'gradient_shift',
  'Equilibrio del Ombligo':    'vertical_poles',
  'Flujo Central':             'column_descent',
  'Cuna Occipital':            'micro_osc',
  'Declaración de Coherencia': 'wave_regularize',
  'Niño Interior':             'circles_approach',
  'Corte de Lazos':            'cord_cut',
  'Metáfora Sensorial':        'perlin_blob',
};
function getAnimType(e){ return ANIM_TYPE_MAP[e.title] || e.ui_mode; }

// ── Animation Engine ──────────────────────────────────────────────────────────
const animEngine = {
  raf:null, t:0, mode:null, clr:'#7ECCCD',
  blobCur:0.35, blobTgt:0.35,
  animType:null, sq:{},
  pts:[], rings:[],

  _rgb(hex){
    return [parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];
  },

  start(mode,cat,color,animType){
    this.stop();
    this.mode=mode; this.clr=color||'#7ECCCD'; this.t=0;
    this.animType=animType||mode;
    this.expl=null; this.cr=null; this.cord=null; this.wr=null; this.flowPts=null;
    const cv=document.getElementById('animCanvas');
    if(!cv) return;
    const zone=cv.parentElement; // .anim-zone — fixed height
    cv.width=zone.offsetWidth||620;
    cv.height=zone.offsetHeight||260;
    if(this.animType==='square'){
      this.sq={phase:0,phaseStart:0,phaseDuration:4000,started:false};
    } else if(mode==='pasos'||mode==='visualizacion'||mode==='reflexion'){
      this._mkPts(cv.width,cv.height);
    } else if(mode==='vocal'){
      this._mkRings(cv.width,cv.height);
    } else {
      this.blobCur=0.35; this.blobTgt=0.35;
    }
    this._loop();
  },

  stop(){
    if(this.raf){ cancelAnimationFrame(this.raf); this.raf=null; }
    const cv=document.getElementById('animCanvas');
    if(cv){ const ctx=cv.getContext('2d'); ctx&&ctx.clearRect(0,0,cv.width,cv.height); }
  },

  setPhase(name,duration){
    // Blob fallback targets
    const n=(name||'').toLowerCase();
    if(n.includes('inhal')||n.includes('inspir')) this.blobTgt=1.0;
    else if(n.includes('exhal')||n.includes('espir')) this.blobTgt=0.18;
    else if(n.includes('sost')||n.includes('hold')) this.blobTgt=0.88;
    else if(n.includes('vac')) this.blobTgt=0.12;
    else this.blobTgt=0.35;
    // Square phase tracking
    if(this.animType==='square'){
      const norm=name.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
      const pmap={inhala:0,reten:1,exhala:2,vacio:3};
      const idx=pmap[norm];
      if(idx!==undefined){
        this.sq.phase=idx;
        this.sq.phaseStart=Date.now();
        this.sq.phaseDuration=(duration||4)*1000;
        this.sq.started=true;
      }
    }
  },

  _mkPts(w,h){
    this.pts=Array.from({length:55},()=>({
      x:Math.random()*w, y:Math.random()*h,
      r:Math.random()*2+0.5,
      sp:Math.random()*0.35+0.12,
      fr:Math.random()*0.015+0.004,
      ph:Math.random()*Math.PI*2,
    }));
  },

  _mkRings(w,h){
    const maxR=Math.min(w,h)*0.38;
    this.rings=Array.from({length:5},(_,i)=>({r:i*(maxR/5),maxR,speed:0.75}));
  },

  _loop(){
    const cv=document.getElementById('animCanvas');
    if(!cv){ this.raf=null; return; }
    const ctx=cv.getContext('2d'), w=cv.width, h=cv.height;
    this.t+=0.016;
    const at=this.animType;
    if(at==='square')              this._squareBreath(ctx,w,h);
    else if(at==='bilateral')      this._bilateral(ctx,w,h);
    else if(at==='pulse_radial')   this._pulseRadial(ctx,w,h);
    else if(at==='wave_asymmetric')this._waveAsymmetric(ctx,w,h);
    else if(at==='wave_charge')    this._waveCharge(ctx,w,h);
    else if(at==='explosion')      this._explosion(ctx,w,h);
    else if(at==='torus')          this._torus(ctx,w,h);
    else if(at==='elliptic_waves') this._ellipticWaves(ctx,w,h);
    else if(at==='crossing')       this._crossing(ctx,w,h);
    else if(at==='infinity')       this._infinity(ctx,w,h);
    else if(at==='circuit')        this._circuit(ctx,w,h);
    else if(at==='flow_up')        this._flowUp(ctx,w,h);
    else if(at==='compress_release')this._compressRelease(ctx,w,h);
    else if(at==='orbit')          this._orbit(ctx,w,h);
    else if(at==='body_column')    this._bodyColumn(ctx,w,h);
    else if(at==='organ_exhale')   this._organExhale(ctx,w,h);
    else if(at==='color_wash')     this._colorWash(ctx,w,h);
    else if(at==='elemental')      this._elemental(ctx,w,h);
    else if(at==='pulse_sync')     this._pulseSync(ctx,w,h);
    else if(at==='gradient_shift') this._gradientShift(ctx,w,h);
    else if(at==='vertical_poles') this._verticalPoles(ctx,w,h);
    else if(at==='column_descent') this._columnDescent(ctx,w,h);
    else if(at==='micro_osc')      this._microOsc(ctx,w,h);
    else if(at==='wave_regularize')this._waveRegularize(ctx,w,h);
    else if(at==='circles_approach')this._circlesApproach(ctx,w,h);
    else if(at==='cord_cut')       this._cordCut(ctx,w,h);
    else if(at==='perlin_blob')    this._perlinBlob(ctx,w,h);
    else if(this.mode==='vocal'){   ctx.clearRect(0,0,w,h); this._rings(ctx,w,h); }
    else if(this.mode==='pasos'||this.mode==='visualizacion'||this.mode==='reflexion'){ ctx.clearRect(0,0,w,h); this._particles(ctx,w,h); }
    else { ctx.clearRect(0,0,w,h); this._blob(ctx,w,h); }
    this.raf=requestAnimationFrame(()=>this._loop());
  },

  // ── Square Breathing — neon light tracing ─────────────────────────────────
  _squareBreath(ctx,w,h){
    // Trail fade: creates motion-blur / glow memory without clearRect
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle='rgba(2,4,16,0.20)';
    ctx.fillRect(0,0,w,h);

    const cx=w/2, cy=h/2, S=Math.min(w,h)*0.46, hs=S/2;
    // Corners: TL TR BR BL
    const C=[[cx-hs,cy-hs],[cx+hs,cy-hs],[cx+hs,cy+hs],[cx-hs,cy+hs]];
    const sides=[[C[0],C[1]],[C[1],C[2]],[C[2],C[3]],[C[3],C[0]]];
    // HSL per phase: Inhala=calipso, Retén=silver-blue, Exhala=violet, Vacío=deep ocean
    const HSL=[[186,90,72],[215,75,82],[265,72,72],[195,55,48]];

    ctx.globalCompositeOperation='lighter';

    // Ghost guide: full square at near-invisible opacity
    for(let i=0;i<4;i++){
      ctx.beginPath();
      ctx.moveTo(sides[i][0][0],sides[i][0][1]);
      ctx.lineTo(sides[i][1][0],sides[i][1][1]);
      ctx.strokeStyle='rgba(126,180,220,0.07)';
      ctx.lineWidth=1; ctx.lineCap='round'; ctx.stroke();
    }
    // Corner anchor dots
    C.forEach(([x,y])=>{
      const g=ctx.createRadialGradient(x,y,0,x,y,7);
      g.addColorStop(0,'rgba(126,204,205,0.18)');
      g.addColorStop(1,'rgba(126,204,205,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,7,0,Math.PI*2); ctx.fill();
    });

    // Idle state: breathing pulse at start corner before user clicks Iniciar
    if(!this.sq.started){
      const pulse=0.3+0.3*Math.sin(this.t*1.7);
      this._glowOrb(ctx,C[0][0],C[0][1],HSL[0],pulse*0.8);
      ctx.globalCompositeOperation='source-over';
      ctx.globalAlpha=1;
      return;
    }

    const ph=this.sq.phase;
    const elapsed=Date.now()-this.sq.phaseStart;
    const raw=Math.min(elapsed/this.sq.phaseDuration,1.0);
    // Smooth ease-in-out
    const prog=raw<0.5?2*raw*raw:1-Math.pow(-2*raw+2,2)/2;

    // Completed sides (persist with slight decay)
    for(let i=0;i<ph;i++){
      const decay=Math.max(0.28, 0.85-(ph-i)*0.18);
      this._glowLine(ctx,sides[i][0],sides[i][1],HSL[i],decay);
    }

    // Active side: trace from start to current progress
    const [s,e]=sides[ph], hsl=HSL[ph];
    const px=s[0]+(e[0]-s[0])*prog;
    const py=s[1]+(e[1]-s[1])*prog;
    if(prog>0.005) this._glowLine(ctx,s,[px,py],hsl,1.0);

    // Drawing orb (the "light pen")
    this._glowOrb(ctx,px,py,hsl,1.0);

    // Corner arrival: brief flash as line completes
    if(prog>0.94){
      const f=(prog-0.94)/0.06;
      this._glowOrb(ctx,e[0],e[1],hsl,f*0.75);
    }

    ctx.globalCompositeOperation='source-over';
    ctx.globalAlpha=1;
  },

  // Luminous line — 4 passes: wide glow, mid glow, core glow, sharp edge
  _glowLine(ctx,from,to,hsl,alpha){
    const [h,s,l]=hsl;
    ctx.lineCap='round';
    [{w:26,a:0.04},{w:11,a:0.13},{w:4,a:0.52},{w:1.4,a:0.94}].forEach(({w,a})=>{
      ctx.beginPath();
      ctx.moveTo(from[0],from[1]);
      ctx.lineTo(to[0],to[1]);
      ctx.strokeStyle=`hsla(${h},${s}%,${l}%,${a*alpha})`;
      ctx.lineWidth=w;
      ctx.stroke();
    });
  },

  // Glowing orb — 3 radial gradients: outer bloom, mid glow, bright core
  _glowOrb(ctx,x,y,hsl,alpha){
    const [h,s,l]=hsl;
    [[38,0.18],[16,0.58],[5,0.96]].forEach(([r,a],i)=>{
      const g=ctx.createRadialGradient(x,y,0,x,y,r);
      g.addColorStop(0,`hsla(${h},${i===2?12:s}%,${i===2?96:l}%,${a*alpha})`);
      g.addColorStop(1,`hsla(${h},${s}%,${l}%,0)`);
      ctx.fillStyle=g;
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    });
  },

  // ── Premium exercise animations ───────────────────────────────────────────

  _bilateral(ctx,w,h){
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle='rgba(2,4,16,0.14)'; ctx.fillRect(0,0,w,h);
    const cx=w/2, cy=h/2, gap=w*0.22;
    const T=8, ph=(this.t%T)/T;
    const raw=ph<0.5?ph*2:(ph-0.5)*2;
    const ease=raw<0.5?2*raw*raw:1-Math.pow(-2*raw+2,2)/2;
    const lA=ph<0.5?0.12+ease*0.88:0.08, rA=ph>=0.5?0.12+ease*0.88:0.08;
    ctx.globalCompositeOperation='lighter';
    [{w:6,a:0.03},{w:1,a:0.07}].forEach(({w:lw,a})=>{
      ctx.beginPath(); ctx.moveTo(cx-gap,cy); ctx.lineTo(cx+gap,cy);
      ctx.strokeStyle=`rgba(200,200,255,${a})`; ctx.lineWidth=lw; ctx.stroke();
    });
    [[cx-gap,[186,90,72],lA],[cx+gap,[265,72,72],rA]].forEach(([x,hsl,a])=>{
      this._glowOrb(ctx,x,cy,hsl,a);
      ctx.beginPath(); ctx.arc(x,cy,40+a*50,0,Math.PI*2);
      ctx.strokeStyle=`hsla(${hsl[0]},${hsl[1]}%,${hsl[2]}%,${a*0.28})`; ctx.lineWidth=1.2; ctx.stroke();
    });
    ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
  },

  _pulseRadial(ctx,w,h){
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle='rgba(2,4,16,0.22)'; ctx.fillRect(0,0,w,h);
    const cx=w/2, cy=h/2, maxR=Math.min(w,h)*0.42;
    ctx.globalCompositeOperation='lighter';
    const T=0.6;
    for(let i=0;i<4;i++){
      const rp=((this.t/T+i/4)%1);
      const r=rp*maxR, a=(1-rp)*0.6;
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
      ctx.strokeStyle=`hsla(45,100%,75%,${a})`; ctx.lineWidth=2-rp*1.5; ctx.stroke();
    }
    this._glowOrb(ctx,cx,cy,[45,100,75],0.5+0.5*Math.sin(this.t*Math.PI*2/T));
    ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
  },

  _waveAsymmetric(ctx,w,h){
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle='rgba(2,4,16,0.15)'; ctx.fillRect(0,0,w,h);
    const cx=w/2, cy=h/2, T=12, ph=(this.t%T)/T;
    let raw=ph<1/3?ph*3:(ph-1/3)/(2/3);
    let scale=raw<0.5?2*raw*raw:1-Math.pow(-2*raw+2,2)/2;
    if(ph>=1/3) scale=1-scale;
    const base=Math.min(w,h)*0.1, mx=Math.min(w,h)*0.36;
    const rx=(base+scale*(mx-base))*0.8, ry=base+scale*(mx-base);
    ctx.globalCompositeOperation='lighter';
    [[20,0.06],[8,0.22],[2.5,0.55],[0.8,0.9]].forEach(([lw,a])=>{
      ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
      ctx.strokeStyle=`hsla(186,90%,72%,${a*(0.3+scale*0.7)})`; ctx.lineWidth=lw; ctx.stroke();
    });
    this._glowOrb(ctx,cx,cy,[186,90,72],0.2+scale*0.65);
    ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
  },

  _waveCharge(ctx,w,h){
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle='rgba(2,4,16,0.18)'; ctx.fillRect(0,0,w,h);
    const cx=w/2, cy=h/2, T=12, ph=(this.t%T)/T;
    let scale;
    if(ph<2/3){ const r=ph*1.5; scale=r<0.5?2*r*r:1-Math.pow(-2*r+2,2)/2; }
    else { scale=1-((ph-2/3)/0.333); }
    scale=Math.max(0,scale);
    const H=h*0.6, topY=cy+H/2-H*scale;
    ctx.globalCompositeOperation='lighter';
    const g=ctx.createLinearGradient(cx,cy+H/2,cx,topY);
    g.addColorStop(0,'hsla(38,95%,68%,0)');
    g.addColorStop(0.5,'hsla(38,95%,68%,0.08)');
    g.addColorStop(1,'hsla(38,95%,68%,0.35)');
    ctx.fillStyle=g; ctx.fillRect(cx-12,topY,24,cy+H/2-topY);
    this._glowLine(ctx,[cx,cy+H/2],[cx,topY],[38,95,68],0.4+scale*0.45);
    this._glowOrb(ctx,cx,topY,[38,95,68],0.5+scale*0.5);
    if(ph>2/3){ const fl=Math.max(0,1-(ph-2/3)/0.1); ctx.globalAlpha=fl*0.25; ctx.fillStyle='hsla(38,100%,85%,1)'; ctx.fillRect(0,0,w,h); ctx.globalAlpha=1; }
    ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
  },

  _explosion(ctx,w,h){
    if(!this.expl) this.expl={t0:this.t,pts:[]};
    const cx=w/2, cy=h/2, T=6, el=(this.t-this.expl.t0)%T;
    if(el>T-0.05) this.expl.pts=[];
    ctx.globalCompositeOperation='source-over';
    if(el<2){

      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
      ctx.strokeStyle=`hsla(${hsl[0]},${hsl[1]}%,${hsl[2]}%,${a})`; ctx.lineWidth=2; ctx.stroke();
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
      ctx.strokeStyle=`hsla(${hsl[0]},${hsl[1]}%,${hsl[2]}%,${a*0.18})`; ctx.lineWidth=14; ctx.stroke();
    });
    const sync=1-Math.min(1,Math.abs(r1-r2)/90);
    this._glowOrb(ctx,cx,cy,[215,75,82],0.18+sync*0.72);
    ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
  },

  _gradientShift(ctx,w,h){
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle='rgba(2,4,16,0.09)'; ctx.fillRect(0,0,w,h);
    const cx=w/2, cy=h/2, T=9, ph=(this.t%T)/T;
    const warmX=cx-w*0.15+ph*w*0.3;
    ctx.globalCompositeOperation='lighter';
    const g1=ctx.createRadialGradient(warmX,cy,0,warmX,cy,w*0.38);
    g1.addColorStop(0,'hsla(0,80%,65%,0.1)'); g1.addColorStop(0.5,'hsla(38,95%,68%,0.05)'); g1.addColorStop(1,'hsla(215,75%,82%,0.01)');
    ctx.fillStyle=g1; ctx.fillRect(0,0,w,h);
    const coolX=w-warmX;
    const g2=ctx.createRadialGradient(coolX,cy,0,coolX,cy,w*0.38);
    g2.addColorStop(0,'hsla(215,75%,82%,0.1)'); g2.addColorStop(0.5,'hsla(186,90%,72%,0.05)'); g2.addColorStop(1,'hsla(0,80%,65%,0.01)');
    ctx.fillStyle=g2; ctx.fillRect(0,0,w,h);
    for(let i=0;i<6;i++){
      const pp=((ph+i/6)%1), px=pp*w, py=cy+Math.sin((ph+i/6)*Math.PI*2)*h*0.14;
      const hue=0+215*pp;
      this._glowOrb(ctx,px,py,[hue,80,72],0.35);
    }
    ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
  },

  _verticalPoles(ctx,w,h){
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle='rgba(2,4,16,0.13)'; ctx.fillRect(0,0,w,h);
    const cx=w/2, cy=h/2, p1y=cy-h*0.22, p2y=cy+h*0.22;
    const ph=(this.t%3)/3, sync=0.35+0.65*Math.abs(Math.sin(ph*Math.PI));
    ctx.globalCompositeOperation='lighter';
    ctx.beginPath(); ctx.moveTo(cx,p1y-18); ctx.lineTo(cx,p2y+18);
    ctx.strokeStyle='rgba(126,204,205,0.05)'; ctx.lineWidth=1; ctx.stroke();
    this._glowOrb(ctx,cx,p1y,[186,90,72],0.35+sync*0.55);
    ctx.beginPath(); ctx.arc(cx,p1y,14+sync*28,0,Math.PI*2);
    ctx.strokeStyle=`hsla(186,90%,72%,${sync*0.22})`; ctx.lineWidth=1.5; ctx.stroke();
    this._glowOrb(ctx,cx,p2y,[265,72,72],0.35+sync*0.55);
    ctx.beginPath(); ctx.arc(cx,p2y,14+sync*28,0,Math.PI*2);
    ctx.strokeStyle=`hsla(265,72%,72%,${sync*0.22})`; ctx.lineWidth=1.5; ctx.stroke();
    this._glowLine(ctx,[cx,p1y],[cx,p2y],[215,75,82],sync*0.45);
    const orbY=p1y+(p2y-p1y)*ph;
    this._glowOrb(ctx,cx,orbY,[215,75,82],sync*0.75);
    ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
  },

  _columnDescent(ctx,w,h){
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle='rgba(2,4,16,0.13)'; ctx.fillRect(0,0,w,h);
    const cx=w/2, pts=Array.from({length:8},(_,i)=>h*0.08+i*(h*0.84/7));
    const T=0.85, ai=Math.floor((this.t/T)%8), ph=(this.t/T)%1;
    ctx.globalCompositeOperation='lighter';
    this._glowOrb(ctx,cx,pts[0],[60,100,85],0.75+0.25*Math.sin(this.t*2));
    pts.forEach((y,i)=>{
      const hue=186-i*13, active=i===ai;
      this._glowOrb(ctx,cx,y,[hue,80,72],active?0.9:0.1);
      if(active){ ctx.beginPath(); ctx.arc(cx,y,18+ph*32,0,Math.PI*2); ctx.strokeStyle=`hsla(${hue},80%,72%,${(1-ph)*0.32})`; ctx.lineWidth=1.5; ctx.stroke(); }
      if(i<7){ ctx.beginPath(); ctx.moveTo(cx,y); ctx.lineTo(cx,pts[i+1]); ctx.strokeStyle='rgba(186,220,230,0.04)'; ctx.lineWidth=1; ctx.stroke(); }
    });
    if(ai>0){ const fromY=pts[ai-1], toY=pts[ai], oy=fromY+(toY-fromY)*ph; this._glowOrb(ctx,cx,oy,[186,90,80],0.55*(1-ph*0.25)); }
    ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
  },

  _microOsc(ctx,w,h){
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle='rgba(2,4,16,0.07)'; ctx.fillRect(0,0,w,h);
    const cx=w/2, cy=h/2, T=8, ph=(this.t%T)/T, amp=Math.sin(ph*Math.PI*2);
    const rx=Math.min(w,h)*0.3+amp*Math.min(w,h)*0.038, ry=Math.min(w,h)*0.18+amp*Math.min(w,h)*0.022;
    ctx.globalCompositeOperation='lighter';
    [[28,0.018],[10,0.038],[2,0.075],[0.8,0.14]].forEach(([lw,a])=>{
      ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
      ctx.strokeStyle=`hsla(215,60%,75%,${a})`; ctx.lineWidth=lw; ctx.stroke();
    });
    this._glowOrb(ctx,cx,cy,[215,60,75],0.07+amp*0.055);
    [[cx,cy-ry],[cx,cy+ry]].forEach(([x,y])=>this._glowOrb(ctx,x,y,[215,60,75],0.05+amp*0.035));
    ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
  },

  _waveRegularize(ctx,w,h){
    if(!this.wr) this.wr={chaos:1.0};
    this.wr.chaos=Math.max(0,this.wr.chaos-0.00028);
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle='rgba(2,4,16,0.13)'; ctx.fillRect(0,0,w,h);
    const cx=w/2, cy=h/2, chaos=this.wr.chaos, amp=h*0.18;
    ctx.globalCompositeOperation='lighter';
    ctx.beginPath();
    for(let x=0;x<w;x+=2){
      const n=x/w;
      const pure=cy+Math.sin(n*Math.PI*4+this.t*2)*amp;
      const noisy=cy+(Math.sin(n*17.3+this.t*3.1)*0.4+Math.sin(n*7.7-this.t*1.8)*0.3+Math.sin(n*29.1+this.t*0.9)*0.3)*amp*chaos*2.5;
      const y=pure*(1-chaos)+noisy*chaos;
      x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    const hue=chaos<0.25?120:186;
    ctx.strokeStyle=`hsla(${hue},85%,72%,0.72)`; ctx.lineWidth=2; ctx.stroke();
    ctx.beginPath();
    for(let x=0;x<w;x+=4){ const y=cy+Math.sin((x/w)*Math.PI*4+this.t*2)*amp; x===0?ctx.moveTo(x,y):ctx.lineTo(x,y); }
    ctx.strokeStyle=`hsla(${hue},85%,72%,0.09)`; ctx.lineWidth=18; ctx.stroke();
    ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
  },

  _circlesApproach(ctx,w,h){
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle='rgba(2,4,16,0.12)'; ctx.fillRect(0,0,w,h);
    const cx=w/2, cy=h/2, T=12, ph=(this.t%T)/T;
    let dist=ph<0.7?(1-ph/0.7):ph<0.85?0:(ph-0.85)/0.15;
    const lr=Math.min(w,h)*0.26, sr=Math.min(w,h)*0.11, sep=dist*w*0.28;
    const lx=cx-sep*0.32, sx=cx+sep*0.52;
    ctx.globalCompositeOperation='lighter';
    [[lr*1.1,0.04],[lr,0.12],[lr*0.85,0.22],[lr*0.45,0.07]].forEach(([r,a])=>{
      ctx.beginPath(); ctx.arc(lx,cy,r,0,Math.PI*2);
      ctx.strokeStyle=`hsla(215,75%,82%,${a})`; ctx.lineWidth=r===lr?2:9; ctx.stroke();
    });
    [[sr*1.2,0.05],[sr,0.18],[sr*0.5,0.5]].forEach(([r,a])=>{
      ctx.beginPath(); ctx.arc(sx,cy,r,0,Math.PI*2);
      ctx.strokeStyle=`hsla(285,72%,80%,${a})`; ctx.lineWidth=r===sr?2:9; ctx.stroke();
    });
    if(dist<0.12){ const bloom=1-dist/0.12; this._glowOrb(ctx,cx,cy,[215,75,82],bloom*0.55); this._glowOrb(ctx,cx,cy,[285,72,80],bloom*0.45); }
    ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
  },

  _cordCut(ctx,w,h){
    if(!this.cord) this.cord={t0:this.t};
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle='rgba(2,4,16,0.15)'; ctx.fillRect(0,0,w,h);
    const cx=w/2, cy=h/2, T=8, el=(this.t-this.cord.t0)%T;
    ctx.globalCompositeOperation='lighter';
    if(el<3){
      const tension=el/3;
      ctx.beginPath();
      const pts=14, Ax=cx-w*0.3, Bx=cx+w*0.3;
      for(let i=0;i<=pts;i++){
        const x=Ax+(Bx-Ax)*(i/pts);
        const y=cy+Math.sin(i*Math.PI*1.5+this.t*5)*14*tension+(Math.random()-0.5)*4*tension;
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.strokeStyle=`hsla(38,80%,60%,${0.28+tension*0.45})`; ctx.lineWidth=1.4+tension*1.2; ctx.stroke();
      ctx.strokeStyle='hsla(38,80%,85%,0.85)'; ctx.lineWidth=0.45; ctx.stroke();
    } else if(el<3.35){
      const fl=1-(el-3)/0.35;
      ctx.globalAlpha=fl*0.65; ctx.fillStyle='rgba(255,220,180,1)'; ctx.fillRect(0,0,w,h); ctx.globalAlpha=1;
    } else if(el<6){
      const age=(el-3.35)/2.65;
      const lx=cx-w*0.12-age*w*0.16, rx=cx+w*0.12+age*w*0.16, a=1-age;
      this._glowOrb(ctx,lx,cy,[38,80,60],a*0.5); this._glowOrb(ctx,rx,cy,[38,80,60],a*0.5);
      for(let i=0;i<4;i++){
        const off=i*0.1;
        if(age>off){ const fa=1-(age-off); this._glowOrb(ctx,lx-(age-off)*28,cy+(Math.random()-0.5)*18,[38,80,70],fa*0.28); }
      }
    } else {
      const age=(el-6)/2;
      this._glowOrb(ctx,cx,cy,[186,90,72],age*0.8);
      ctx.beginPath(); ctx.arc(cx,cy,8+age*32,0,Math.PI*2);
      ctx.strokeStyle=`hsla(186,90%,72%,${(1-age)*0.38})`; ctx.lineWidth=2; ctx.stroke();
    }
    ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
  },

  _perlinBlob(ctx,w,h){
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle='rgba(2,4,16,0.12)'; ctx.fillRect(0,0,w,h);
    const cx=w/2, cy=h/2, base=Math.min(w,h)*0.23;
    ctx.globalCompositeOperation='lighter';
    for(let layer=2;layer>=0;layer--){
      const N=140;
      ctx.beginPath();
      for(let i=0;i<=N;i++){
        const a=(i/N)*Math.PI*2;
        const n=Math.sin(a*2+this.t*0.28)*0.18+Math.sin(a*3-this.t*0.48)*0.12+Math.sin(a*5+this.t*0.68)*0.07+Math.sin(a*7-this.t*0.19)*0.04+Math.sin(a*11+this.t*0.88)*0.02;
        const r=base*(1+n)*(1+layer*0.14);
        const x=cx+Math.cos(a)*r, y=cy+Math.sin(a)*r;
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.closePath();
      const al=layer===0?0.17:layer===1?0.07:0.035;
      const g=ctx.createRadialGradient(cx,cy,0,cx,cy,base*1.6);
      g.addColorStop(0,`hsla(285,60%,72%,${al*2})`); g.addColorStop(0.5,`hsla(186,60%,72%,${al})`); g.addColorStop(1,'hsla(186,60%,72%,0)');
      ctx.fillStyle=g; ctx.fill();
      ctx.strokeStyle=`hsla(285,60%,76%,${al*3})`; ctx.lineWidth=layer===0?1.5:0.5; ctx.stroke();
    }
    ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
  },

  // ── Generic fallbacks (other exercises) ───────────────────────────────────
  _blob(ctx,w,h){
    this.blobCur+=(this.blobTgt-this.blobCur)*0.018;
    const cx=w/2, cy=h/2, base=Math.min(w,h)*0.28;
    const [r,g,b]=this._rgb(this.clr);
    for(let layer=3;layer>=0;layer--){
      const lr=base*this.blobCur*(1+layer*0.18);
      const N=120; ctx.beginPath();
      for(let i=0;i<=N;i++){
        const a=(i/N)*Math.PI*2;
        const noise=Math.sin(a*3+this.t*0.7)*0.11+Math.sin(a*5-this.t*0.45)*0.06+Math.sin(a*7+this.t*0.9)*0.03+Math.sin(a*2-this.t*0.3)*0.05;
        const rad=lr*(1+noise);
        const x2=cx+Math.cos(a)*rad, y2=cy+Math.sin(a)*rad;
        i===0?ctx.moveTo(x2,y2):ctx.lineTo(x2,y2);
      }
      ctx.closePath();
      const al=layer===0?0.22:(0.07/(layer+0.5));
      const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,lr*1.15);
      grd.addColorStop(0,`rgba(${r},${g},${b},${al*2})`);
      grd.addColorStop(0.6,`rgba(${r},${g},${b},${al})`);
      grd.addColorStop(1,`rgba(${r},${g},${b},0)`);
      ctx.fillStyle=grd; ctx.fill();
    }
  },

  _particles(ctx,w,h){
    const [r,g,b]=this._rgb(this.clr);
    this.pts.forEach(p=>{
      p.y-=p.sp; p.x+=Math.sin(this.t*p.fr*60+p.ph)*0.28;
      if(p.y<-4){ p.y=h+4; p.x=Math.random()*w; }
      const alpha=(p.y/h)*0.35+0.04;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${r},${g},${b},${Math.min(alpha,0.38)})`; ctx.fill();
    });
  },

  _rings(ctx,w,h){
    const [r,g,b]=this._rgb(this.clr);
    const cx=w/2, cy=h/2;
    this.rings.forEach(ring=>{
      ring.r+=ring.speed;
      if(ring.r>ring.maxR) ring.r=0;
      const alpha=(1-ring.r/ring.maxR)*0.5;
      ctx.beginPath(); ctx.arc(cx,cy,ring.r,0,Math.PI*2);
      ctx.strokeStyle=`rgba(${r},${g},${b},${alpha})`;
      ctx.lineWidth=1.5; ctx.stroke();
    });
  },
};

// ── Audio Engine ──────────────────────────────────────────────────────────────
const audioEngine = {
  Ctx:null, osc:null, gain:null, active:false,
  FREQS:{aliento:128,integracion:174,resonancia:285,espectro:396,campo:432,presencia:528},

  toggle(){
    if(this.active) this.stop();
    else if(ejercActual) this.start(ejercActual.category);
  },

  start(cat){
    try{
      if(!this.Ctx) this.Ctx=new(window.AudioContext||window.webkitAudioContext)();
      if(this.Ctx.state==='suspended') this.Ctx.resume();
      if(this.osc){ try{this.osc.stop();}catch(e){} this.osc=null; }
      const freq=this.FREQS[cat]||174;
      this.osc=this.Ctx.createOscillator();
      this.gain=this.Ctx.createGain();
      this.osc.type='sine';
      this.osc.frequency.value=freq;
      this.gain.gain.setValueAtTime(0,this.Ctx.currentTime);
      this.gain.gain.linearRampToValueAtTime(0.05,this.Ctx.currentTime+2.5);
      this.osc.connect(this.gain); this.gain.connect(this.Ctx.destination);
      this.osc.start();
      this.active=true;
      const btn=document.getElementById('audioToggle');
      if(btn){btn.textContent='♪ Sonando';btn.classList.add('on');}
    }catch(e){console.warn('Audio:',e);}
  },

  stop(){
    if(this.gain&&this.Ctx){
      try{
        this.gain.gain.linearRampToValueAtTime(0,this.Ctx.currentTime+0.8);
        const o=this.osc;
        setTimeout(()=>{try{o&&o.stop();}catch(e){}},950);
      }catch(e){}
    }
    this.active=false;
    const btn=document.getElementById('audioToggle');
    if(btn){btn.textContent='♪ Sonido';btn.classList.remove('on');}
  },
};

// ── Init ─────────────────────────────────────────────────────────────────────
initCounts();

// Aplicar categoría inicial si viene por URL
if (CATEGORIA_INICIAL) {
  const btn = document.querySelector(`.cat-btn[data-cat="${CATEGORIA_INICIAL}"]`);
  if (btn) { document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
  catActual = CATEGORIA_INICIAL;
}

renderGrid();

// Abrir ejercicio directamente si viene en URL
if (EJERCICIO_INICIAL) {
  setTimeout(()=>abrirEjercicio(EJERCICIO_INICIAL), 100);
}
</script>

{% extends "base.html" %}
{% block title %}Regulación — Endonautas{% endblock %}
{% block content %}
<style data-page-style>
/* ── Layout ── */
.reg-wrap { display:grid; grid-template-columns:220px 1fr; gap:1.5rem; align-items:start; }
@media(max-width:780px){ .reg-wrap { grid-template-columns:1fr; } }

/* ── Sidebar categorías ── */
.cat-nav { display:flex; flex-direction:column; gap:0.4rem; }
.cat-btn {
  display:flex; align-items:center; gap:0.75rem;
  padding:0.65rem 0.9rem; border-radius:12px;
  background:transparent; border:1px solid transparent;
  color:var(--muted); font-size:0.8rem; font-family:var(--font-display);
  cursor:pointer; transition:all 0.2s; text-align:left; width:100%;
}
.cat-btn:hover { background:var(--surface); color:#fff; }
.cat-btn.active { background:var(--surface2); border-color:var(--border-active); color:var(--calipso); }
.cat-icon { font-size:1.1rem; width:22px; text-align:center; flex-shrink:0; }
.cat-count { margin-left:auto; font-size:0.65rem; color:var(--dim);
  background:rgba(255,255,255,0.06); border-radius:100px; padding:1px 7px; }

/* ── Grid de ejercicios ── */
.ejerc-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:1rem; }
.ejerc-card {
  background:var(--surface); border:1px solid var(--border); border-radius:14px;
  padding:1.1rem 1.1rem 1rem; cursor:pointer; transition:all 0.2s;
  display:flex; flex-direction:column; gap:0.4rem;
}
.ejerc-card:hover { border-color:var(--border-active); background:var(--surface2); transform:translateY(-2px); }
.ejerc-cat-tag { font-size:0.58rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; }
.ejerc-title { font-family:var(--font-display); font-size:0.88rem; font-weight:600; color:#fff; line-height:1.3; }
.ejerc-sub { font-size:0.72rem; color:var(--muted); line-height:1.3; }
.ejerc-footer { display:flex; align-items:center; gap:0.5rem; margin-top:0.5rem; }
.ejerc-dur { font-size:0.65rem; color:var(--dim); }
.ejerc-mode-badge { font-size:0.6rem; background:rgba(255,255,255,0.06); color:var(--dim);
  border-radius:100px; padding:2px 8px; }

/* ── Player ── */
.player-wrap { display:none; }
.player-wrap.active { display:block; }
.player-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:1.5rem; }
.back-btn {
  display:flex; align-items:center; gap:0.4rem; background:var(--surface);
  border:1px solid var(--border); border-radius:10px; padding:0.4rem 0.75rem;
  color:var(--muted); font-size:0.75rem; cursor:pointer; transition:all 0.15s;
  font-family:var(--font-display);
}
.back-btn:hover { color:#fff; border-color:var(--border-active); }
.player-cat-tag { font-size:0.6rem; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; }

.player-panel { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:1.75rem; position:relative; overflow:hidden; }
#animCanvas { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:0; display:block; }
.pcw { position:relative; z-index:1; }
.player-title { font-family:var(--font-display); font-size:1.3rem; font-weight:700; color:#fff; margin-bottom:0.2rem; }
.player-sub { font-size:0.82rem; color:var(--muted); margin-bottom:1rem; }
.player-desc { font-size:0.82rem; color:var(--dim); line-height:1.6; margin-bottom:1.5rem;
  padding-bottom:1.25rem; border-bottom:1px solid var(--border); }
.precaution { background:rgba(217,119,6,0.1); border:1px solid rgba(217,119,6,0.3);
  border-radius:10px; padding:0.65rem 0.9rem; font-size:0.75rem; color:#d4a056;
  margin-bottom:1.25rem; display:flex; gap:0.5rem; align-items:flex-start; }

/* ── Player: Respiración ── */
.breath-player { display:flex; flex-direction:column; align-items:center; gap:1.5rem; padding:1rem 0; }
.breath-ring-outer { position:relative; width:160px; height:160px; }
.breath-svg { width:100%; height:100%; transform:rotate(-90deg); }
.breath-track { fill:none; stroke:rgba(255,255,255,0.06); stroke-width:6; }
.breath-prog { fill:none; stroke:var(--calipso); stroke-width:6; stroke-linecap:round;
  transition:stroke-dashoffset 0.5s linear; }
.breath-inner-circle { position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:2px; }
.breath-phase-name { font-family:var(--font-display); font-size:0.8rem; color:var(--calipso);
  font-weight:700; letter-spacing:0.08em; }
.breath-countdown { font-family:var(--font-display); font-size:2rem; font-weight:700; color:#fff; }
.breath-cue { font-size:0.75rem; color:var(--dim); text-align:center; max-width:260px; min-height:2.4em; }
.breath-phases-dots { display:flex; gap:6px; }
.breath-dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.1); transition:all 0.3s; }
.breath-dot.active { background:var(--calipso); }
.breath-cycle-info { font-size:0.72rem; color:var(--dim); }
.breath-controls { display:flex; gap:0.75rem; }

/* ── Player: Pasos ── */
.steps-player { display:flex; flex-direction:column; gap:1.25rem; }
.step-progress { display:flex; gap:4px; margin-bottom:0.25rem; }
.step-pip { height:3px; border-radius:100px; flex:1; background:rgba(255,255,255,0.08); transition:all 0.3s; }
.step-pip.done { background:var(--calipso); }
.step-pip.current { background:rgba(126,204,205,0.5); }
.step-body { background:var(--surface2); border-radius:12px; padding:1.25rem; min-height:100px; }
.step-num { font-size:0.6rem; color:var(--dim); font-weight:700; letter-spacing:0.1em; margin-bottom:0.5rem; }
.step-title-main { font-family:var(--font-display); font-size:1rem; font-weight:600; color:#fff; margin-bottom:0.65rem; }
.step-instructions { font-size:0.82rem; color:var(--muted); line-height:1.65; white-space:pre-line; }
.steps-nav { display:flex; gap:0.75rem; justify-content:space-between; align-items:center; }
.step-counter { font-size:0.72rem; color:var(--dim); }

/* ── Player: Vocal ── */
.vocal-player { display:flex; flex-direction:column; align-items:center; gap:1.5rem; padding:1rem 0; }
.vocal-sound { font-size:3.5rem; font-family:var(--font-display); font-weight:700; color:var(--calipso);
  text-shadow:0 0 40px rgba(126,204,205,0.4); animation:vocalPulse 2s ease-in-out infinite; }
@keyframes vocalPulse { 0%,100%{opacity:0.8;transform:scale(1)} 50%{opacity:1;transform:scale(1.06)} }
.vocal-zone { font-size:0.65rem; color:var(--dim); letter-spacing:0.1em; text-transform:uppercase; }
.vocal-body { font-size:0.82rem; color:var(--muted); text-align:center; max-width:320px; line-height:1.6; }
.vocal-wave { display:flex; align-items:flex-end; gap:3px; height:32px; }
.vocal-bar { width:4px; border-radius:2px; background:var(--calipso); opacity:0.3; }
.vocal-bar.a { animation:waveBar 0.8s ease-in-out infinite; }
.vocal-bar.b { animation:waveBar 0.8s ease-in-out 0.15s infinite; }
.vocal-bar.c { animation:waveBar 0.8s ease-in-out 0.30s infinite; }
.vocal-bar.d { animation:waveBar 0.8s ease-in-out 0.45s infinite; }
.vocal-bar.e { animation:waveBar 0.8s ease-in-out 0.60s infinite; }
@keyframes waveBar {
  0%,100% { height:6px; opacity:0.3; }
  50% { height:28px; opacity:0.9; }
}

/* ── Player: Visualización / Reflexión ── */
.visual-player, .reflex-player { display:flex; flex-direction:column; gap:1.25rem; }
.step-body.visual { background:rgba(126,204,205,0.04); border:1px solid rgba(126,204,205,0.15); }

/* ── Botones ── */
.btn-reg { padding:0.55rem 1.2rem; border-radius:10px; font-size:0.8rem; font-family:var(--font-display);
  font-weight:600; cursor:pointer; transition:all 0.2s; border:1px solid transparent; }
.btn-primary { background:var(--calipso); color:#0a0a14; }
.btn-primary:hover { filter:brightness(1.1); }
.btn-outline { background:transparent; border-color:var(--border); color:var(--muted); }
.btn-outline:hover { border-color:var(--border-active); color:#fff; }
.btn-sm { padding:0.4rem 0.9rem; font-size:0.73rem; }
.btn-done { background:rgba(126,204,205,0.12); border:1px solid rgba(126,204,205,0.3); color:var(--calipso); }
.btn-done:hover { background:rgba(126,204,205,0.2); }

/* ── Vacío ── */
.empty-cat { text-align:center; padding:3rem 1rem; color:var(--dim); font-size:0.82rem; }

/* ── Audio toggle ── */
.audio-btn {
  margin-left:auto; display:flex; align-items:center; gap:0.3rem;
  background:rgba(255,255,255,0.04); border:1px solid var(--border);
  border-radius:8px; padding:0.28rem 0.65rem; color:var(--dim);
  font-size:0.68rem; cursor:pointer; transition:all 0.2s; font-family:var(--font-display);
}
.audio-btn.on { border-color:rgba(126,204,205,0.45); color:var(--calipso); background:rgba(126,204,205,0.08); }
</style>

<div style="margin-bottom:1.75rem; display:flex; align-items:flex-end; gap:1rem; flex-wrap:wrap;">
  <div>
    <h1 style="font-family:var(--font-display);font-size:1.6rem;font-weight:700;color:#fff;letter-spacing:-0.02em;margin:0">Regulación</h1>
    <p style="font-size:0.8rem;color:var(--dim);margin:4px 0 0">{{ total }} ejercicio{{ total|pluralize }} · Elige una categoría o un ejercicio directo</p>
  </div>
</div>

<div class="reg-wrap" id="regWrap">

  <!-- Sidebar navegación de categorías -->
  <nav class="cat-nav" id="catNav">
    <button class="cat-btn active" data-cat="" onclick="setCat(this,'')">
      <span class="cat-icon">◎</span> Todos
      <span class="cat-count" id="count-all">{{ total }}</span>
    </button>
    <button class="cat-btn" data-cat="aliento" onclick="setCat(this,'aliento')">
      <span class="cat-icon">◌</span> Aliento
      <span class="cat-count" id="count-aliento">–</span>
    </button>
    <button class="cat-btn" data-cat="integracion" onclick="setCat(this,'integracion')">
      <span class="cat-icon">⊕</span> Integración
      <span class="cat-count" id="count-integracion">–</span>
    </button>
    <button class="cat-btn" data-cat="resonancia" onclick="setCat(this,'resonancia')">
      <span class="cat-icon">∿</span> Resonancia
      <span class="cat-count" id="count-resonancia">–</span>
    </button>
    <button class="cat-btn" data-cat="espectro" onclick="setCat(this,'espectro')">
      <span class="cat-icon">◈</span> Espectro
      <span class="cat-count" id="count-espectro">–</span>
    </button>
    <button class="cat-btn" data-cat="campo" onclick="setCat(this,'campo')">
      <span class="cat-icon">⬡</span> Campo
      <span class="cat-count" id="count-campo">–</span>
    </button>
    <button class="cat-btn" data-cat="presencia" onclick="setCat(this,'presencia')">
      <span class="cat-icon">◉</span> Presencia
      <span class="cat-count" id="count-presencia">–</span>
    </button>
  </nav>

  <!-- Área principal -->
  <div id="mainArea">

    <!-- Biblioteca -->
    <div id="biblioteca">
      <div class="ejerc-grid" id="ejercGrid"></div>
      <div class="empty-cat" id="emptyMsg" style="display:none">Sin ejercicios en esta categoría.</div>
    </div>

    <!-- Player -->
    <div class="player-wrap" id="playerWrap">
      <div class="player-header">
        <button class="back-btn" onclick="cerrarPlayer()">← Volver</button>
        <span class="player-cat-tag" id="playerCatTag" style="color:var(--calipso)"></span>
        <button class="audio-btn" id="audioToggle" onclick="audioEngine.toggle()">♪ Sonido</button>
      </div>
      <div class="player-panel">
        <canvas id="animCanvas"></canvas>
        <div class="pcw">
        <div class="player-title" id="playerTitle"></div>
        <div class="player-sub" id="playerSub"></div>
        <div class="player-desc" id="playerDesc"></div>
        <div class="precaution" id="playerPrecaution" style="display:none">
          <span>⚠</span><span id="playerPrecautionText"></span>
        </div>
        <div id="playerBody"></div>
        <div style="margin-top:1.5rem; padding-top:1.25rem; border-top:1px solid var(--border); display:flex; gap:0.75rem; flex-wrap:wrap;">
          <button class="btn-reg btn-done" onclick="marcarCompletado()">Ejercicio completado</button>
        </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const EJERCICIOS = {{ ejercicios_json|safe }};
const EJERCICIO_INICIAL = {{ ejercicio_inicial|default:"null" }};
const CATEGORIA_INICIAL = "{{ categoria_inicial }}";

const CAT_COLORS = {
  aliento:'#7ECCCD', integracion:'#9b8ec4', resonancia:'#c97b84',
  espectro:'#d4a056', campo:'#7ECCCD', presencia:'#9b8ec4',
};
const CAT_LABELS = {
  aliento:'Aliento', integracion:'Integración', resonancia:'Resonancia',
  espectro:'Espectro', campo:'Campo', presencia:'Presencia',
};
const MODE_LABELS = {
  respiracion:'Timer', pasos:'Guiado', vocal:'Vocal',
  visualizacion:'Visualización', reflexion:'Reflexión',
};

let catActual = CATEGORIA_INICIAL || '';
let ejercActual = null;

// ── Conteos ──────────────────────────────────────────────────────────────────
function initCounts() {
  const counts = {};
  Object.values(EJERCICIOS).forEach(e => { counts[e.category] = (counts[e.category]||0)+1; });
  Object.keys(counts).forEach(c => {
    const el = document.getElementById('count-' + c);
    if (el) el.textContent = counts[c];
  });
}

// ── Biblioteca ────────────────────────────────────────────────────────────────
function setCat(btn, cat) {
  catActual = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function renderGrid() {
  cerrarPlayer(true);
  const grid = document.getElementById('ejercGrid');
  const empty = document.getElementById('emptyMsg');
  const lista = Object.values(EJERCICIOS).filter(e => !catActual || e.category === catActual);
  if (!lista.length) { grid.innerHTML=''; empty.style.display=''; return; }
  empty.style.display = 'none';
  grid.innerHTML = lista.map(e => `
    <div class="ejerc-card" onclick="abrirEjercicio('${e.id}')">
      <div class="ejerc-cat-tag" style="color:${CAT_COLORS[e.category]||'var(--calipso)'}">${CAT_LABELS[e.category]||e.category}</div>
      <div class="ejerc-title">${e.title}</div>
      <div class="ejerc-sub">${e.subtitle||''}</div>
      <div class="ejerc-footer">
        <span class="ejerc-dur">⏱ ${e.duration_minutes} min</span>
        <span class="ejerc-mode-badge">${MODE_LABELS[e.ui_mode]||e.ui_mode}</span>
      </div>
    </div>
  `).join('');
}

// ── Player ────────────────────────────────────────────────────────────────────
function abrirEjercicio(id) {
  const e = EJERCICIOS[String(id)];
  if (!e) return;
  ejercActual = e;

  document.getElementById('playerTitle').textContent = e.title;
  document.getElementById('playerSub').textContent = e.subtitle || '';
  document.getElementById('playerDesc').textContent = e.description || '';
  document.getElementById('playerCatTag').textContent = CAT_LABELS[e.category] || e.category;
  document.getElementById('playerCatTag').style.color = CAT_COLORS[e.category] || 'var(--calipso)';

  const prec = document.getElementById('playerPrecaution');
  if (e.precaution) {
    document.getElementById('playerPrecautionText').textContent = e.precaution;
    prec.style.display = 'flex';
  } else {
    prec.style.display = 'none';
  }

  document.getElementById('playerBody').innerHTML = renderPlayer(e);
  initPlayer(e);

  document.getElementById('biblioteca').style.display = 'none';
  document.getElementById('playerWrap').classList.add('active');
  document.getElementById('regWrap').scrollIntoView({behavior:'smooth', block:'start'});
  setTimeout(() => animEngine.start(e.ui_mode, e.category, CAT_COLORS[e.category]), 60);
}

function cerrarPlayer(silent) {
  stopBreath();
  animEngine.stop();
  audioEngine.stop();
  document.getElementById('playerWrap').classList.remove('active');
  document.getElementById('biblioteca').style.display = '';
  ejercActual = null;
  if (!silent) document.getElementById('regWrap').scrollIntoView({behavior:'smooth', block:'start'});
}

function renderPlayer(e) {
  if (e.ui_mode === 'respiracion') return renderBreath(e);
  if (e.ui_mode === 'vocal') return renderVocal(e);
  if (e.ui_mode === 'visualizacion') return renderVisual(e);
  if (e.ui_mode === 'reflexion') return renderReflex(e);
  return renderPasos(e); // default: pasos
}

// ── Respiración ──────────────────────────────────────────────────────────────
let breathTimer = null, breathPhaseIdx = 0, breathCountdown = 0, breathCycles = 0, breathRunning = false;

function renderBreath(e) {
  const r = 68, circ = 2*Math.PI*r;
  const dots = (e.phases||[]).map((_,i)=>`<div class="breath-dot" id="bdot-${i}"></div>`).join('');
  return `<div class="breath-player">
    <div class="breath-ring-outer">
      <svg class="breath-svg" viewBox="0 0 160 160">
        <circle class="breath-track" cx="80" cy="80" r="${r}"/>
        <circle class="breath-prog" id="breathProg" cx="80" cy="80" r="${r}"
          stroke-dasharray="${circ}" stroke-dashoffset="${circ}"/>
      </svg>
      <div class="breath-inner-circle">
        <div class="breath-phase-name" id="bPhaseName">${(e.phases&&e.phases[0])?e.phases[0].name:'—'}</div>
        <div class="breath-countdown" id="bCountdown">—</div>
      </div>
    </div>
    <div class="breath-phases-dots">${dots}</div>
    <div class="breath-cue" id="bCue">${(e.phases&&e.phases[0])?e.phases[0].cue||'':''}</div>
    <div class="breath-cycle-info" id="bCycleInfo">Ciclo 0</div>
    <div class="breath-controls">
      <button class="btn-reg btn-primary" id="breathStartBtn" onclick="toggleBreath()">Iniciar</button>
    </div>
  </div>`;
}

function initPlayer(e) {
  if (e.ui_mode === 'respiracion') {
    breathPhaseIdx = 0; breathCycles = 0; breathRunning = false;
  }
  if (e.ui_mode === 'pasos') {
    currentStep = 0;
    renderStep(e, 0);
  }
  if (e.ui_mode === 'vocal') {
    currentVocalStep = 0;
    renderVocalStep(e, 0);
  }
  if (e.ui_mode === 'visualizacion' || e.ui_mode === 'reflexion') {
    currentStep = 0;
    renderStep(e, 0);
  }
}

function toggleBreath() {
  if (!ejercActual) return;
  breathRunning = !breathRunning;
  const btn = document.getElementById('breathStartBtn');
  if (btn) btn.textContent = breathRunning ? 'Pausar' : 'Continuar';
  if (breathRunning) tickBreath();
  else stopBreath(false);
}

function stopBreath(reset) {
  if (breathTimer) { clearTimeout(breathTimer); breathTimer = null; }
  breathRunning = false;
  const btn = document.getElementById('breathStartBtn');
  if (btn) btn.textContent = reset===false ? 'Continuar' : 'Iniciar';
}

function tickBreath() {
  if (!breathRunning || !ejercActual) return;
  const phases = ejercActual.phases || [];
  if (!phases.length) return;
  const phase = phases[breathPhaseIdx % phases.length];
  const r = 68, circ = 2*Math.PI*r;
  const dur = phase.duration;

  const phaseName = document.getElementById('bPhaseName');
  const cueEl = document.getElementById('bCue');
  const cdEl = document.getElementById('bCountdown');
  const prog = document.getElementById('breathProg');
  const cycleEl = document.getElementById('bCycleInfo');

  if (phaseName) phaseName.textContent = phase.name;
  if (cueEl) cueEl.textContent = phase.cue || '';
  animEngine.setPhase(phase.name);

  // Update dots
  phases.forEach((_,i) => {
    const dot = document.getElementById('bdot-'+i);
    if (dot) dot.classList.toggle('active', i === breathPhaseIdx % phases.length);
  });

  let remaining = dur;
  function tick() {
    if (!breathRunning) return;
    const fraction = remaining / dur;
    if (prog) prog.style.strokeDashoffset = circ * fraction;
    if (cdEl) cdEl.textContent = remaining;
    if (remaining <= 0) {
      breathPhaseIdx++;
      if (breathPhaseIdx % phases.length === 0) {
        breathCycles++;
        if (cycleEl) cycleEl.textContent = `Ciclo ${breathCycles}`;
      }
      tickBreath();
      return;
    }
    remaining--;
    breathTimer = setTimeout(tick, 1000);
  }
  tick();
}

// ── Pasos ────────────────────────────────────────────────────────────────────
let currentStep = 0;

function renderPasos(e) {
  const n = (e.steps||[]).length;
  const pips = Array.from({length:n},(_,i)=>`<div class="step-pip" id="pip-${i}"></div>`).join('');
  return `<div class="steps-player">
    <div class="step-progress">${pips}</div>
    <div class="step-body" id="stepBody"></div>
    <div class="steps-nav">
      <button class="btn-reg btn-outline btn-sm" id="prevBtn" onclick="moveStep(-1)">← Anterior</button>
      <span class="step-counter" id="stepCounter"></span>
      <button class="btn-reg btn-primary btn-sm" id="nextBtn" onclick="moveStep(1)">Siguiente →</button>
    </div>
  </div>`;
}

function renderStep(e, idx) {
  const steps = e.steps || [];
  const n = steps.length;
  if (!n) return;
  currentStep = Math.max(0, Math.min(idx, n-1));
  const step = steps[currentStep];
  const body = document.getElementById('stepBody');
  if (body) {
    body.innerHTML = `
      <div class="step-num">PASO ${currentStep+1} DE ${n}</div>
      <div class="step-title-main">${step.title}</div>
      <div class="step-instructions">${step.body}</div>
    `;
  }
  const counter = document.getElementById('stepCounter');
  if (counter) counter.textContent = `${currentStep+1} / ${n}`;
  const prev = document.getElementById('prevBtn');
  const next = document.getElementById('nextBtn');
  if (prev) prev.disabled = currentStep === 0;
  if (next) {
    next.textContent = currentStep === n-1 ? 'Finalizar ✓' : 'Siguiente →';
    next.onclick = currentStep === n-1 ? marcarCompletado : () => moveStep(1);
  }
  // Update pips
  for (let i=0;i<n;i++) {
    const pip = document.getElementById('pip-'+i);
    if (pip) {
      pip.classList.remove('done','current');
      if (i < currentStep) pip.classList.add('done');
      else if (i === currentStep) pip.classList.add('current');
    }
  }
}

function moveStep(dir) {
  if (!ejercActual) return;
  renderStep(ejercActual, currentStep + dir);
}

// ── Vocal ────────────────────────────────────────────────────────────────────
let currentVocalStep = 0;

function renderVocal(e) {
  const n = (e.steps||[]).length;
  const pips = Array.from({length:n},(_,i)=>`<div class="step-pip" id="vpip-${i}"></div>`).join('');
  return `<div class="vocal-player">
    <div class="vocal-wave">
      <div class="vocal-bar a" style="height:8px"></div>
      <div class="vocal-bar b" style="height:14px"></div>
      <div class="vocal-bar c" style="height:20px"></div>
      <div class="vocal-bar d" style="height:14px"></div>
      <div class="vocal-bar e" style="height:8px"></div>
    </div>
    <div class="vocal-sound" id="vocalSound">—</div>
    <div class="vocal-zone" id="vocalZone"></div>
    <div class="vocal-body" id="vocalBody"></div>
    <div class="step-progress" style="width:100%;max-width:260px">${pips}</div>
    <div class="breath-controls">
      <button class="btn-reg btn-outline btn-sm" id="vPrevBtn" onclick="moveVocal(-1)">← Anterior</button>
      <button class="btn-reg btn-primary btn-sm" id="vNextBtn" onclick="moveVocal(1)">Siguiente →</button>
    </div>
  </div>`;
}

function renderVocalStep(e, idx) {
  const steps = e.steps || [];
  const n = steps.length;
  currentVocalStep = Math.max(0, Math.min(idx, n-1));
  const step = steps[currentVocalStep];
  const sound = document.getElementById('vocalSound');
  const zone = document.getElementById('vocalZone');
  const body = document.getElementById('vocalBody');
  if (sound) sound.textContent = step.title.split('—')[0].trim();
  if (zone) zone.textContent = (step.zona||'').toUpperCase();
  if (body) body.textContent = step.body;
  for (let i=0;i<n;i++) {
    const pip = document.getElementById('vpip-'+i);
    if (pip) {
      pip.classList.remove('done','current');
      if (i < currentVocalStep) pip.classList.add('done');
      else if (i === currentVocalStep) pip.classList.add('current');
    }
  }
  const next = document.getElementById('vNextBtn');
  if (next) {
    next.textContent = currentVocalStep===n-1 ? 'Finalizar ✓' : 'Siguiente →';
    next.onclick = currentVocalStep===n-1 ? marcarCompletado : ()=>moveVocal(1);
  }
}

function moveVocal(dir) {
  if (!ejercActual) return;
  renderVocalStep(ejercActual, currentVocalStep + dir);
}

// ── Visualización ─────────────────────────────────────────────────────────────
function renderVisual(e) {
  const n = (e.steps||[]).length;
  const pips = Array.from({length:n},(_,i)=>`<div class="step-pip" id="pip-${i}"></div>`).join('');
  return `<div class="visual-player">
    <div class="step-progress">${pips}</div>
    <div class="step-body visual" id="stepBody"></div>
    <div class="steps-nav">
      <button class="btn-reg btn-outline btn-sm" id="prevBtn" onclick="moveStep(-1)">← Anterior</button>
      <span class="step-counter" id="stepCounter"></span>
      <button class="btn-reg btn-primary btn-sm" id="nextBtn" onclick="moveStep(1)">Siguiente →</button>
    </div>
  </div>`;
}

function renderReflex(e) {
  return renderVisual(e);
}

// ── Completado ────────────────────────────────────────────────────────────────
function marcarCompletado() {
  if (!ejercActual) return;
  fetch('/regulacion/completado/', {
    method:'POST',
    headers:{'Content-Type':'application/json','X-CSRFToken':document.querySelector('[name=csrfmiddlewaretoken]')?.value||''},
    body: JSON.stringify({ejercicio_id: ejercActual.id}),
  }).catch(()=>{});
  const btn = document.querySelector('.btn-done');
  if (btn) { btn.textContent = '✓ Registrado en bitácora'; btn.disabled = true; }
}

// ── Animation Engine ──────────────────────────────────────────────────────────
const animEngine = {
  raf:null, t:0, mode:null, clr:'#7ECCCD',
  blobCur:0.35, blobTgt:0.35,
  pts:[], rings:[],

  _rgb(hex){
    return [parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];
  },

  start(mode, cat, color){
    this.stop();
    this.mode=mode; this.clr=color||'#7ECCCD'; this.t=0;
    const cv=document.getElementById('animCanvas');
    if(!cv) return;
    const panel=cv.parentElement;
    cv.width=panel.offsetWidth||620;
    cv.height=panel.offsetHeight||420;
    if(mode==='pasos'||mode==='visualizacion'||mode==='reflexion') this._mkPts(cv.width,cv.height);
    if(mode==='vocal') this._mkRings(cv.width,cv.height);
    if(mode==='respiracion'){ this.blobCur=0.35; this.blobTgt=0.35; }
    this._loop();
  },

  stop(){
    if(this.raf){ cancelAnimationFrame(this.raf); this.raf=null; }
    const cv=document.getElementById('animCanvas');
    if(cv){ const ctx=cv.getContext('2d'); ctx&&ctx.clearRect(0,0,cv.width,cv.height); }
  },

  setPhase(name){
    const n=(name||'').toLowerCase();
    if(n.includes('inhal')||n.includes('inspir')) this.blobTgt=1.0;
    else if(n.includes('exhal')||n.includes('espir')) this.blobTgt=0.18;
    else if(n.includes('sost')||n.includes('ret')||n.includes('hold')) this.blobTgt=0.88;
    else this.blobTgt=0.35;
  },

  _mkPts(w,h){
    this.pts=Array.from({length:55},()=>({
      x:Math.random()*w, y:Math.random()*h,
      r:Math.random()*2+0.5,
      sp:Math.random()*0.35+0.12,
      fr:Math.random()*0.015+0.004,
      ph:Math.random()*Math.PI*2,
    }));
  },

  _mkRings(w,h){
    const maxR=Math.min(w,h)*0.38;
    this.rings=Array.from({length:5},(_,i)=>({r:i*(maxR/5), maxR, speed:0.75}));
  },

  _loop(){
    const cv=document.getElementById('animCanvas');
    if(!cv){ this.raf=null; return; }
    const ctx=cv.getContext('2d'), w=cv.width, h=cv.height;
    ctx.clearRect(0,0,w,h);
    this.t+=0.016;
    if(this.mode==='respiracion') this._blob(ctx,w,h);
    else if(this.mode==='vocal') this._rings(ctx,w,h);
    else this._particles(ctx,w,h);
    this.raf=requestAnimationFrame(()=>this._loop());
  },

  _blob(ctx,w,h){
    this.blobCur+=(this.blobTgt-this.blobCur)*0.018;
    const cx=w/2, cy=h/2, base=Math.min(w,h)*0.28;
    const [r,g,b]=this._rgb(this.clr);
    for(let layer=3;layer>=0;layer--){
      const lr=base*this.blobCur*(1+layer*0.18);
      const N=120; ctx.beginPath();
      for(let i=0;i<=N;i++){
        const a=(i/N)*Math.PI*2;
        const noise=
          Math.sin(a*3+this.t*0.7)*0.11+
          Math.sin(a*5-this.t*0.45)*0.06+
          Math.sin(a*7+this.t*0.9)*0.03+
          Math.sin(a*2-this.t*0.3)*0.05;
        const rad=lr*(1+noise);
        const x=cx+Math.cos(a)*rad, y=cy+Math.sin(a)*rad;
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.closePath();
      const alpha=layer===0?0.22:(0.07/(layer+0.5));
      const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,lr*1.15);
      grd.addColorStop(0,`rgba(${r},${g},${b},${alpha*2})`);
      grd.addColorStop(0.6,`rgba(${r},${g},${b},${alpha})`);
      grd.addColorStop(1,`rgba(${r},${g},${b},0)`);
      ctx.fillStyle=grd; ctx.fill();
    }
  },

  _particles(ctx,w,h){
    const [r,g,b]=this._rgb(this.clr);
    this.pts.forEach(p=>{
      p.y-=p.sp;
      p.x+=Math.sin(this.t*p.fr*60+p.ph)*0.28;
      if(p.y<-4){ p.y=h+4; p.x=Math.random()*w; }
      const alpha=(p.y/h)*0.35+0.04;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${r},${g},${b},${Math.min(alpha,0.38)})`; ctx.fill();
    });
  },

  _rings(ctx,w,h){
    const [r,g,b]=this._rgb(this.clr);
    const cx=w/2, cy=h/2;
    this.rings.forEach(ring=>{
      ring.r+=ring.speed;
      if(ring.r>ring.maxR) ring.r=0;
      const alpha=(1-ring.r/ring.maxR)*0.5;
      ctx.beginPath(); ctx.arc(cx,cy,ring.r,0,Math.PI*2);
      ctx.strokeStyle=`rgba(${r},${g},${b},${alpha})`;
      ctx.lineWidth=1.5; ctx.stroke();
    });
  },
};

// ── Audio Engine ──────────────────────────────────────────────────────────────
const audioEngine = {
  Ctx:null, osc:null, gain:null, active:false,
  FREQS:{aliento:128,integracion:174,resonancia:285,espectro:396,campo:432,presencia:528},

  toggle(){
    if(this.active) this.stop();
    else if(ejercActual) this.start(ejercActual.category);
  },

  start(cat){
    try{
      if(!this.Ctx) this.Ctx=new(window.AudioContext||window.webkitAudioContext)();
      if(this.Ctx.state==='suspended') this.Ctx.resume();
      if(this.osc){ try{this.osc.stop();}catch(e){} this.osc=null; }
      const freq=this.FREQS[cat]||174;
      this.osc=this.Ctx.createOscillator();
      this.gain=this.Ctx.createGain();
      this.osc.type='sine';
      this.osc.frequency.value=freq;
      this.gain.gain.setValueAtTime(0,this.Ctx.currentTime);
      this.gain.gain.linearRampToValueAtTime(0.05,this.Ctx.currentTime+2.5);
      this.osc.connect(this.gain); this.gain.connect(this.Ctx.destination);
      this.osc.start();
      this.active=true;
      const btn=document.getElementById('audioToggle');
      if(btn){btn.textContent='♪ Sonando';btn.classList.add('on');}
    }catch(e){console.warn('Audio:',e);}
  },

  stop(){
    if(this.gain&&this.Ctx){
      try{
        this.gain.gain.linearRampToValueAtTime(0,this.Ctx.currentTime+0.8);
        const o=this.osc;
        setTimeout(()=>{try{o&&o.stop();}catch(e){}},950);
      }catch(e){}
    }
    this.active=false;
    const btn=document.getElementById('audioToggle');
    if(btn){btn.textContent='♪ Sonido';btn.classList.remove('on');}
  },
};

// ── Init ─────────────────────────────────────────────────────────────────────
initCounts();

// Aplicar categoría inicial si viene por URL
if (CATEGORIA_INICIAL) {
  const btn = document.querySelector(`.cat-btn[data-cat="${CATEGORIA_INICIAL}"]`);
  if (btn) { document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
  catActual = CATEGORIA_INICIAL;
}

renderGrid();

// Abrir ejercicio directamente si viene en URL
if (EJERCICIO_INICIAL) {
  setTimeout(()=>abrirEjercicio(EJERCICIO_INICIAL), 100);
}
</script>

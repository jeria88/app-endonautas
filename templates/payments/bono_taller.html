<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activa tu mes gratis — Endonautas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #07060f; color: #e8e6f0; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
    .wrap { max-width: 440px; width: 100%; }
    h1 { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; }
    .sub { font-size: 0.88rem; color: rgba(255,255,255,0.45); line-height: 1.7; margin-bottom: 2rem; }
    .error-msg { background: rgba(185,80,80,0.1); border: 1px solid rgba(185,80,80,0.2); border-radius: 10px; padding: 0.85rem 1rem; font-size: 0.83rem; color: #e07b7b; margin-bottom: 1.5rem; }
    input { width: 100%; padding: 0.85rem 1rem; border-radius: 10px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.03); color: #fff; font-size: 0.9rem; font-family: inherit; margin-bottom: 1rem; }
    input:focus { outline: none; border-color: rgba(126,204,205,0.4); }
    .btn { display: block; width: 100%; padding: 0.85rem 1rem; border-radius: 10px; font-size: 0.9rem; font-weight: 600; text-decoration: none; border: none; cursor: pointer; font-family: inherit; background: rgba(126,204,205,0.15); border: 1px solid rgba(126,204,205,0.3); color: #7ecccd; }
    .btn:hover { opacity: 0.85; }
    .note { font-size: 0.75rem; color: rgba(255,255,255,0.3); text-align: center; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Activa tu mes gratis</h1>
    <p class="sub">Usa el mismo email con el que pagaste la seña del taller.</p>
    {% if error %}
      <p class="error-msg">{{ error }}</p>
    {% endif %}
    <form method="POST" action="{% url 'pago_mp_bono_taller' %}">
      {% csrf_token %}
      <input type="email" name="email" placeholder="tu@email.com" autocomplete="email" required>
      <button type="submit" class="btn">Activar Plan Practicante gratis</button>
    </form>
    <p class="note">Vas a autorizar el cobro mensual con MercadoPago — el primer mes no se cobra.</p>
  </div>
</body>
</html>

{% extends "base.html" %}
{% block title %}Registro — Endonautas{% endblock %}

{% block public_content %}
<style data-page-style>
.auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
.auth-box { background: rgba(0,0,0,0.88); border: 1px solid rgba(255,255,255,0.14); border-radius: 20px; padding: 2.5rem 2rem; width: 100%; max-width: 420px; }
.auth-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.25rem; }
.auth-sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 2rem; }
.auth-footer { text-align: center; font-size: 0.82rem; color: var(--muted); margin-top: 1.5rem; }
.auth-footer a { color: var(--accent); text-decoration: none; }
.auth-divider { display: flex; align-items: center; gap: 0.75rem; margin: 1.25rem 0; }
.auth-divider span { font-size: 0.75rem; color: var(--dim,rgba(255,255,255,0.3)); white-space: nowrap; }
.auth-divider::before, .auth-divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.1); }
.btn-google { display:flex; align-items:center; justify-content:center; gap:0.6rem; width:100%; padding:0.65rem 1rem; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.15); border-radius:10px; color:var(--text,#fff); font-size:0.9rem; font-weight:500; text-decoration:none; transition:background 0.2s; }
.btn-google:hover { background:rgba(255,255,255,0.11); }
.btn-google svg { flex-shrink:0; }
</style>
<div class="auth-wrap">
  <div class="auth-box">
    <a href="/" style="color:var(--accent);text-decoration:none;font-size:0.85rem;">← endonautas</a>
    <h1 class="auth-title" style="margin-top:1.25rem">Comienza tu viaje</h1>
    <p class="auth-sub">Crea tu cuenta gratuita</p>

    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">¿Cómo te llamamos?</label>
        <input type="text" name="first_name" class="form-input" placeholder="Tu nombre">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-input" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input type="password" name="password" class="form-input" required minlength="8">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem">Crear cuenta</button>
    </form>

    <div class="auth-divider"><span>o continúa con</span></div>

    <a href="/oauth/google/login/{% if request.GET.plan %}?plan={{ request.GET.plan }}{% elif request.GET.next %}?next={{ request.GET.next }}{% else %}?next=/dashboard/{% endif %}" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continuar con Google
    </a>

    <div class="auth-footer">
      ¿Ya tienes cuenta? <a href="/login/">Ingresar</a>
    </div>
  </div>
</div>
{% endblock %}

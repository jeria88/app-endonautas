{% extends "base.html" %}
{% block title %}Ingresar — Endonautas{% endblock %}

{% block public_content %}
<style data-page-style>
.auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
.auth-box { background: rgba(0,0,0,0.88); border: 1px solid rgba(255,255,255,0.14); border-radius: 20px; padding: 2.5rem 2rem; width: 100%; max-width: 400px; }
.auth-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.25rem; color: var(--text); }
.auth-sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 2rem; }
.auth-footer { text-align: center; font-size: 0.82rem; color: var(--muted); margin-top: 1.5rem; }
.auth-footer a { color: var(--accent); text-decoration: none; }
</style>
<div class="auth-wrap">
  <div class="auth-box">
    <a href="/" style="color:var(--accent);text-decoration:none;font-size:0.85rem;">← endonautas</a>
    <h1 class="auth-title" style="margin-top:1.25rem">Bienvenido de vuelta</h1>
    <p class="auth-sub">Ingresa con tu email</p>

    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-input" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input type="password" name="password" class="form-input" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem">Ingresar</button>
    </form>

    <div class="auth-footer">
      ¿Sin cuenta? <a href="/registro/">Regístrate gratis</a>
    </div>
  </div>
</div>
{% endblock %}

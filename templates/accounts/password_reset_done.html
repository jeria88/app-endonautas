{% extends "base.html" %}
{% block title %}Email enviado — Endonautas{% endblock %}
{% block public_content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem">
  <div style="width:100%;max-width:400px;text-align:center">
    <div style="font-size:2.5rem;margin-bottom:1rem;color:var(--calipso)">✦</div>
    <h1 style="font-size:1.4rem;font-weight:700;color:#fff;margin-bottom:0.75rem">Revisa tu email</h1>
    <p style="font-size:0.88rem;color:var(--muted);line-height:1.6;margin-bottom:2rem">
      Si existe una cuenta con ese email, recibirás un enlace para restablecer tu contraseña en los próximos minutos.
    </p>
    <a href="/login/" class="btn btn-primary">Volver al inicio de sesión</a>
  </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Mis resultados — Endonautas{% endblock %}
{% block content %}
<div style="max-width:640px">
  <h1 style="font-size:1.3rem;font-weight:700;margin-bottom:1.5rem">Mis resultados</h1>
  <div class="panel">
    {% for r in results %}
    <div style="display:flex;align-items:center;justify-content:space-between;padding:0.75rem 0;border-bottom:1px solid var(--border)">
      <div>
        <div style="font-size:0.92rem;font-weight:500">{{ r.test.name }}</div>
        <div style="font-size:0.75rem;color:var(--muted)">{{ r.completed_at|date:"d M Y · H:i" }}</div>
      </div>
      <a href="/tests/resultado/{{ r.pk }}/" onclick="spaGo(event,this)" class="btn btn-ghost" style="font-size:0.78rem">Ver →</a>
    </div>
    {% empty %}
    <div style="color:var(--muted);text-align:center;padding:2rem">Sin resultados aún. <a href="/tests/" onclick="spaGo(event,this)" style="color:var(--accent)">Comenzar tests →</a></div>
    {% endfor %}
  </div>
</div>
{% endblock %}

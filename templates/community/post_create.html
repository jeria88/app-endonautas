{% extends "base.html" %}
{% block title %}Publicar — Endonautas{% endblock %}
{% block content %}
<div style="max-width:560px">
  <a href="/comunidad/" onclick="spaGo(event,this)" style="color:var(--accent);text-decoration:none;font-size:0.85rem">← Comunidad</a>
  <h1 style="font-size:1.3rem;font-weight:700;margin:1.25rem 0 1.5rem">Nueva publicación</h1>
  <div class="panel">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="form-group">
        <textarea name="content" class="form-input" rows="5" required autofocus placeholder="Comparte desde tu experiencia..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Área (opcional)</label>
        <select name="somatic_tag" class="form-input">
          <option value="">Sin categoría</option>
          <option value="cuerpo">Cuerpo</option>
          <option value="mente">Mente</option>
          <option value="emociones">Emociones</option>
          <option value="vinculos">Vínculos</option>
          <option value="proposito">Propósito</option>
          <option value="sombra">Sombra</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Imagen (opcional)</label>
        <input type="file" name="image" class="form-input" accept="image/*">
      </div>
      <div style="display:flex;gap:0.75rem">
        <button type="submit" class="btn btn-primary">Publicar</button>
        <a href="/comunidad/" onclick="spaGo(event,this)" class="btn btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Mensajes — Endonautas{% endblock %}
{% block content %}
<style data-page-style>
.inbox-layout { display:grid;grid-template-columns:280px 1fr;gap:0;height:calc(100vh - 7rem);border:1px solid var(--border);border-radius:16px;overflow:hidden;background:var(--surface);backdrop-filter:blur(14px); }
.contacts-panel { border-right:1px solid var(--border);display:flex;flex-direction:column; }
.contacts-search { padding:14px;border-bottom:1px solid var(--border); }
.contacts-search input { width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:0.85rem;outline:none;font-family:var(--font-ui); }
.contacts-list { flex:1;overflow-y:auto; }
.contact-row { display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;transition:background 0.15s;border-bottom:1px solid rgba(255,255,255,0.03); }
.contact-row:hover, .contact-row.active { background:rgba(126,204,205,0.06); }
.contact-avatar { width:38px;height:38px;border-radius:50%;background:var(--surface2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.9rem;font-weight:600;color:var(--calipso);flex-shrink:0;font-family:var(--font-display); }
.contact-info { flex:1;min-width:0; }
.contact-name { font-size:0.875rem;font-weight:600;color:#fff;font-family:var(--font-display); }
.contact-preview { font-size:0.75rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.contact-time { font-size:0.68rem;color:var(--dim);flex-shrink:0; }
/* Chat area */
.chat-panel { display:flex;flex-direction:column; }
.chat-header { padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px; }
.chat-messages { flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px; }
.chat-empty { flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--dim);gap:12px; }
.chat-input-area { padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end; }
.chat-input-area textarea { flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:0.88rem;resize:none;font-family:var(--font-ui);outline:none;min-height:42px;max-height:120px; }
.chat-input-area textarea:focus { border-color:var(--calipso); }
@media(max-width:768px){ .inbox-layout { grid-template-columns:1fr;height:calc(100vh - 54px - 2rem); } .contacts-panel { display:none; } }
</style>

<div class="inbox-layout">
  <!-- Panel izquierdo: contactos -->
  <div class="contacts-panel">
    <div class="contacts-search">
      <input placeholder="Buscar conversación...">
    </div>
    <div class="contacts-list">
      <div class="contact-row active">
        <div class="contact-avatar">FJ</div>
        <div class="contact-info">
          <div class="contact-name">Franco Jeria</div>
          <div class="contact-preview">Demo de conversación</div>
        </div>
        <div class="contact-time">ahora</div>
      </div>
    </div>
  </div>

  <!-- Panel derecho: chat -->
  <div class="chat-panel">
    <div class="chat-header">
      <div class="contact-avatar">⬡</div>
      <div>
        <div style="font-family:var(--font-display);font-size:0.92rem;font-weight:600;color:#fff">Mensajería</div>
        <div style="font-size:0.72rem;color:var(--muted)">Próximamente disponible</div>
      </div>
    </div>
    <div class="chat-empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--border)"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      <p style="font-size:0.85rem">Los mensajes directos entre usuarios<br>estarán disponibles pronto.</p>
      <a href="/comunidad/" onclick="spaGo(event,this)" class="btn btn-outline btn-sm">Ir al Inicio</a>
    </div>
    <div class="chat-input-area" style="opacity:0.4;pointer-events:none">
      <textarea placeholder="Escribe un mensaje..." rows="1"></textarea>
      <button class="btn btn-primary btn-sm" disabled>Enviar</button>
    </div>
  </div>
</div>
{% endblock %}

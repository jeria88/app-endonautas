<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error del servidor — Endonautas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #07060f;
      color: #e8e6f0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .wrap {
      text-align: center;
      max-width: 420px;
    }
    .code {
      font-family: 'Syne', sans-serif;
      font-size: clamp(5rem, 20vw, 8rem);
      font-weight: 700;
      color: #c97b84;
      line-height: 1;
      letter-spacing: -0.04em;
      opacity: 0.25;
      margin-bottom: 1.5rem;
    }
    .title {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.75rem;
    }
    .sub {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      padding: 0.7rem 1.5rem;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      background: rgba(201,123,132,0.1);
      border: 1px solid rgba(201,123,132,0.25);
      color: #c97b84;
      transition: opacity 0.15s;
      margin-right: 0.5rem;
    }
    .btn:hover { opacity: 0.7; }
    .btn-ghost {
      background: transparent;
      border-color: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">500</div>
    <div class="title">Algo salió mal</div>
    <p class="sub">El servidor encontró un error inesperado.<br>Ya lo registramos. Intenta de nuevo en unos minutos.</p>
    <a href="javascript:history.back()" class="btn">← Volver</a>
    <a href="/" class="btn btn-ghost">Inicio</a>
  </div>
</body>
</html>
